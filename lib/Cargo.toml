[package]
name = "star"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description.workspace = true

[lib]
path = "lib.rs"

[features]
default = ["http_llm"]
llm = ["candle-core", "candle-transformers", "tokenizers"]
# http_llm feature enables remote HTTP llm-server polish path (ureq is always available)
http_llm = []

[dependencies]
candle-core = { path = "../../candle/candle-core", optional = true }
candle-transformers = { path = "../../candle/candle-transformers", optional = true }
tokenizers = { version = "0.22.0", default-features = false, optional = true }
safetensors.workspace = true
rusqlite.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tokio.workspace = true
ureq.workspace = true
urlencoding.workspace = true
tiny_http.workspace = true
clap.workspace = true
dirs.workspace = true
rand.workspace = true
rand_distr.workspace = true
regex.workspace = true
reqwest.workspace = true
parking_lot.workspace = true