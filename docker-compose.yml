# Starfire + LLM Server — Local Development Compose
#
# Usage:
#   docker compose up --build        # start both
#   docker compose up --build -d     # start both in background
#   docker compose logs -f llm        # watch LLM server logs
#   docker compose logs -f starfire  # watch starfire logs
#
# Starfire talks to LLM at http://llm:8081 automatically.

services:
  starfire:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - RAILWAY_PUBLIC_DOMAIN=localhost
      - LLM_ENDPOINT=http://llm:8081
    depends_on:
      llm:
        condition: service_healthy
    volumes:
      - star_data:/data

  llm:
    build:
      context: .
      dockerfile: llm-server/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - HOST=0.0.0.0
      - PORT=8081
      - GGUF_PATH=/models/bonsai-8b/Bonsai-8B.gguf
    volumes:
      - ./models:/models:ro  # mount model read-only
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  star_data:
