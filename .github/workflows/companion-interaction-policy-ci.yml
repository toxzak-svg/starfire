name: Companion Interaction Policy S5-A CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/companion_interaction_policy.rs"
      - "lib/examples/s5a_shadow_interaction_policy_probe.rs"
      - "lib/companion_prediction_ledger.rs"
      - "lib/companion_state/**"
      - "lib/web_retrieval.rs"
      - "lib/web_search_searxng.rs"
      - "lib/web_content_extract.rs"
      - "lib/web_research.rs"
      - "scripts/check_web_retrieval_a0.sh"
      - "lib/lib.rs"
      - "lib/Cargo.toml"
      - "docs/INGEXUITY_STARFIRE_INTEGRATION.md"
      - "docs/experiments/S5A_SHADOW_INTERACTION_POLICY.md"
      - ".github/workflows/companion-interaction-policy-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  s5a-shadow-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format S5-A sources for verification
        run: |
          rustfmt --edition 2021 \
            lib/companion_interaction_policy.rs \
            lib/examples/s5a_shadow_interaction_policy_probe.rs

      - name: Compile S5-A planner and probe
        run: |
          cargo check -p star --lib --features companion-interaction-policy --locked
          cargo check -p star --example s5a_shadow_interaction_policy_probe \
            --features companion-interaction-policy --locked

      - name: Lint S5-A feature path
        run: cargo clippy -p star --lib --features companion-interaction-policy --locked

      - name: Test S5-A contracts deterministically
        run: >-
          cargo test -p star --lib --features companion-interaction-policy --locked
          companion_interaction_policy:: -- --test-threads=1

      - name: Run frozen S5-A shadow-policy probe
        run: |
          set -o pipefail
          cargo run -p star --example s5a_shadow_interaction_policy_probe \
            --features companion-interaction-policy --locked \
            | tee s5a-shadow-interaction-policy-report.json

      - name: Preserve S5-A report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s5a-shadow-interaction-policy-report
          path: s5a-shadow-interaction-policy-report.json
          if-no-files-found: ignore
          retention-days: 30

  web-retrieval-diagnostic:
    name: web-retrieval-diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check scoped formatting
        run: |
          rustfmt --edition 2021 --config skip_children=true --check lib/lib.rs
          rustfmt --edition 2021 --check \
            lib/web_retrieval.rs \
            lib/web_search_searxng.rs \
            lib/web_content_extract.rs \
            lib/web_research.rs

      - name: Compile retrieval features
        run: cargo check -p star --lib --features web-search-searxng --locked

      - name: Lint retrieval features
        run: cargo clippy -p star --lib --features web-search-searxng --locked -- -D warnings

      - name: Test bounded retrieval contracts
        run: cargo test -p star --lib --features web-search-searxng --locked web_retrieval:: -- --test-threads=1

      - name: Test SearXNG provider contracts
        run: cargo test -p star --lib --features web-search-searxng --locked web_search_searxng:: -- --test-threads=1

      - name: Test extraction contracts
        run: cargo test -p star --lib --features web-search-searxng --locked web_content_extract:: -- --test-threads=1

      - name: Test orchestration contracts
        run: cargo test -p star --lib --features web-search-searxng --locked web_research:: -- --test-threads=1
