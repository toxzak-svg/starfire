name: Companion Interaction Policy S5-A CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/companion_interaction_policy.rs"
      - "lib/examples/s5a_shadow_interaction_policy_probe.rs"
      - "lib/companion_prediction_ledger.rs"
      - "lib/companion_state/**"
      - "lib/web_retrieval.rs"
      - "lib/web_search_searxng.rs"
      - "lib/web_content_extract.rs"
      - "lib/web_research.rs"
      - "scripts/check_web_retrieval_a0.sh"
      - "lib/lib.rs"
      - "lib/Cargo.toml"
      - "docs/INGEXUITY_STARFIRE_INTEGRATION.md"
      - "docs/experiments/S5A_SHADOW_INTERACTION_POLICY.md"
      - ".github/workflows/companion-interaction-policy-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  s5a-shadow-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format S5-A sources for verification
        run: |
          rustfmt --edition 2021 \
            lib/companion_interaction_policy.rs \
            lib/examples/s5a_shadow_interaction_policy_probe.rs

      - name: Compile S5-A planner and probe
        run: |
          cargo check -p star --lib --features companion-interaction-policy --locked
          cargo check -p star --example s5a_shadow_interaction_policy_probe \
            --features companion-interaction-policy --locked

      - name: Lint S5-A feature path
        run: cargo clippy -p star --lib --features companion-interaction-policy --locked

      - name: Test S5-A contracts deterministically
        run: >-
          cargo test -p star --lib --features companion-interaction-policy --locked
          companion_interaction_policy:: -- --test-threads=1

      - name: Run frozen S5-A shadow-policy probe
        run: |
          set -o pipefail
          cargo run -p star --example s5a_shadow_interaction_policy_probe \
            --features companion-interaction-policy --locked \
            | tee s5a-shadow-interaction-policy-report.json

      - name: Preserve S5-A report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s5a-shadow-interaction-policy-report
          path: s5a-shadow-interaction-policy-report.json
          if-no-files-found: ignore
          retention-days: 30

  web-retrieval-diagnostic:
    name: web-retrieval-diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check scoped formatting
        id: formatting
        continue-on-error: true
        run: |
          rustfmt --edition 2021 --config skip_children=true --check lib/lib.rs > formatting.log 2>&1
          rustfmt --edition 2021 --check lib/web_retrieval.rs lib/web_search_searxng.rs lib/web_content_extract.rs lib/web_research.rs >> formatting.log 2>&1

      - name: Compile retrieval features
        id: compile
        continue-on-error: true
        run: cargo check -p star --lib --features web-search-searxng --locked > compile.log 2>&1

      - name: Lint retrieval features
        id: clippy
        continue-on-error: true
        run: cargo clippy -p star --lib --features web-search-searxng --locked -- -D warnings > clippy.log 2>&1

      - name: Test bounded retrieval contracts
        id: retrieval
        continue-on-error: true
        run: cargo test -p star --lib --features web-search-searxng --locked web_retrieval:: -- --test-threads=1 > retrieval.log 2>&1

      - name: Test SearXNG provider contracts
        id: search
        continue-on-error: true
        run: cargo test -p star --lib --features web-search-searxng --locked web_search_searxng:: -- --test-threads=1 > search.log 2>&1

      - name: Test extraction contracts
        id: extraction
        continue-on-error: true
        run: cargo test -p star --lib --features web-search-searxng --locked web_content_extract:: -- --test-threads=1 > extraction.log 2>&1

      - name: Test orchestration contracts
        id: research
        continue-on-error: true
        run: cargo test -p star --lib --features web-search-searxng --locked web_research:: -- --test-threads=1 > research.log 2>&1

      - name: Publish exact retrieval matrix
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          FORMAT_RESULT: ${{ steps.formatting.outcome }}
          COMPILE_RESULT: ${{ steps.compile.outcome }}
          CLIPPY_RESULT: ${{ steps.clippy.outcome }}
          RETRIEVAL_RESULT: ${{ steps.retrieval.outcome }}
          SEARCH_RESULT: ${{ steps.search.outcome }}
          EXTRACTION_RESULT: ${{ steps.extraction.outcome }}
          RESEARCH_RESULT: ${{ steps.research.outcome }}
        run: |
          failed=""
          [ "$FORMAT_RESULT" = "success" ] || failed="$failed FORMAT"
          [ "$COMPILE_RESULT" = "success" ] || failed="$failed COMPILE"
          [ "$CLIPPY_RESULT" = "success" ] || failed="$failed CLIPPY"
          [ "$RETRIEVAL_RESULT" = "success" ] || failed="$failed RETRIEVAL"
          [ "$SEARCH_RESULT" = "success" ] || failed="$failed SEARCH"
          [ "$EXTRACTION_RESULT" = "success" ] || failed="$failed EXTRACTION"
          [ "$RESEARCH_RESULT" = "success" ] || failed="$failed RESEARCH"
          {
            echo "## Web Retrieval CI result"
            echo
            echo "- formatting: $FORMAT_RESULT"
            echo "- compile: $COMPILE_RESULT"
            echo "- clippy: $CLIPPY_RESULT"
            echo "- retrieval tests: $RETRIEVAL_RESULT"
            echo "- SearXNG tests: $SEARCH_RESULT"
            echo "- extraction tests: $EXTRACTION_RESULT"
            echo "- orchestration tests: $RESEARCH_RESULT"
            if [ -n "$failed" ]; then
              echo
              echo "Failed stages:$failed"
              echo '```text'
              for stage in $failed; do
                lower=$(printf '%s' "$stage" | tr 'A-Z' 'a-z')
                case "$lower" in
                  format) log=formatting.log ;;
                  *) log="$lower.log" ;;
                esac
                echo "===== $stage ====="
                tail -n 60 "$log" 2>/dev/null || true
              done
              echo '```'
            else
              echo
              echo "All locked retrieval validation stages passed."
            fi
          } > diagnostic.md
          jq -n --rawfile body diagnostic.md '{body:$body}' | gh api --method PATCH repos/${{ github.repository }}/issues/comments/5054930185 --input -
          [ -z "$failed" ]
