name: Apply S6-A review fix

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/apply-s6a-review-fix.yml"

permissions:
  contents: write

jobs:
  apply-review-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: experiment/s6a-reversible-live-policy-canary
          fetch-depth: 0

      - name: Remove token serialization surface
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("lib/companion_live_policy_canary.rs")
          text = path.read_text()
          old = "#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\npub struct PromotionAuthorization"
          new = "#[derive(Debug, Clone, PartialEq, Eq)]\npub struct PromotionAuthorization"
          if text.count(old) != 1:
              raise SystemExit(f"expected exactly one promotion token derive, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1))

          doc = Path("docs/experiments/S6A_REVERSIBLE_LIVE_POLICY_CANARY.md")
          doc_text = doc.read_text()
          marker = "A synthetically conformant report may be installed for audit testing, but it can\nnever authorize live influence."
          replacement = "`PromotionAuthorization` is a non-serializable capability token with private\nfields; callers cannot reconstruct or deserialize one around the validated\nconstructor. A synthetically conformant report may be installed for audit\ntesting, but it can never authorize live influence."
          if marker not in doc_text:
              raise SystemExit("missing authorization-token contract marker")
          doc.write_text(doc_text.replace(marker, replacement, 1))
          PY

      - name: Remove one-shot workflow
        run: rm .github/workflows/apply-s6a-review-fix.yml

      - name: Commit review fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(companion): prevent forged S6-A authorization tokens"
          git push origin HEAD:experiment/s6a-reversible-live-policy-canary
