name: Publish Starfire SGP dataset to Kaggle

on:
  workflow_dispatch:
    inputs:
      version_message:
        description: Kaggle dataset version message
        required: false
        default: Publish Starfire SGP CNN/RNN corpora v1

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      DATASET_DIR: tools/stlm_l1d/data/sgp_v1
      DATASET_ID: zacharymaronek/starfire-sgp-cnn-rnn-training-corpora
    steps:
      - name: Check out dataset branch
        uses: actions/checkout@v4
        with:
          ref: dataset/stlm-sgp-v1

      - name: Require Kaggle credentials
        shell: bash
        run: |
          test -n "$KAGGLE_USERNAME" || { echo "Missing KAGGLE_USERNAME repository secret"; exit 1; }
          test -n "$KAGGLE_KEY" || { echo "Missing KAGGLE_KEY repository secret"; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: python -m pip install --disable-pip-version-check --upgrade kaggle

      - name: Verify publication payload
        shell: bash
        run: |
          test -f "$DATASET_DIR/dataset-metadata.json"
          test -f "$DATASET_DIR/starfire_rnn_silver_gold_platinum.jsonl"
          test -f "$DATASET_DIR/starfire_cnn_silver_gold_platinum.jsonl"
          test -f "$DATASET_DIR/SHA256SUMS"
          python "$DATASET_DIR/tools/validate_datasets.py" "$DATASET_DIR"
          grep -F '"id": "zacharymaronek/starfire-sgp-cnn-rnn-training-corpora"' "$DATASET_DIR/dataset-metadata.json"

      - name: Create or version Kaggle dataset
        shell: bash
        env:
          VERSION_MESSAGE: ${{ inputs.version_message }}
        run: |
          set -euo pipefail
          if kaggle datasets files "$DATASET_ID" >/dev/null 2>&1; then
            kaggle datasets version \
              -p "$DATASET_DIR" \
              -m "$VERSION_MESSAGE" \
              --dir-mode zip
          else
            kaggle datasets create \
              -p "$DATASET_DIR" \
              --dir-mode zip
          fi
