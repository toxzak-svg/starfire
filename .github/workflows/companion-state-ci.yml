name: Companion State CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/companion_state/**"
      - "lib/companion_observer.rs"
      - "lib/examples/s3_companion_observer_false_positive_probe.rs"
      - "lib/persistence/companion.rs"
      - "lib/persistence/store.rs"
      - "lib/persistence/mod.rs"
      - "lib/charge/mod.rs"
      - "lib/user_model/companion_projection.rs"
      - "lib/user_model/mod.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - "docs/INGEXUITY_STARFIRE_INTEGRATION.md"
      - ".github/workflows/companion-state-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  companion-state:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check existing companion formatting
        run: |
          rustfmt --edition 2021 --check \
            lib/persistence/companion.rs \
            lib/persistence/store.rs \
            lib/persistence/mod.rs \
            lib/charge/mod.rs \
            lib/user_model/companion_projection.rs \
            lib/user_model/mod.rs

      - name: Normalize S3 sources for verification
        run: |
          rustfmt --edition 2021 \
            lib/companion_observer.rs \
            lib/examples/s3_companion_observer_false_positive_probe.rs

      - name: Check Star library and S3 observer
        run: |
          cargo check -p star --lib --locked
          cargo check -p star --lib --features companion-observer --locked
          cargo check -p star --example s3_companion_observer_false_positive_probe --features companion-observer --locked

      - name: Lint S3 under module-local warning denial
        run: cargo clippy -p star --lib --features companion-observer --locked

      - name: Test companion state contracts
        run: cargo test -p star --locked companion_state:: -- --test-threads=1

      - name: Test companion persistence contracts
        run: cargo test -p star --locked persistence::companion:: -- --test-threads=1

      - name: Test legacy user-model projection
        run: cargo test -p star --locked user_model::companion_projection:: -- --test-threads=1

      - name: Test S3 shadow observer contracts
        run: cargo test -p star --features companion-observer --locked companion_observer:: -- --test-threads=1

      - name: Run frozen S3 matched-control gate
        run: cargo run -p star --example s3_companion_observer_false_positive_probe --features companion-observer --locked

      - name: Test CHARGE companion integration
        run: cargo test -p star --locked charge::companion_integration_tests:: -- --test-threads=1
