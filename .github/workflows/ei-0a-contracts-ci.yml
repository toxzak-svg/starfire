name: EI-0A Canonical Episode Contracts CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/emerging_intelligence/**"
      - "lib/examples/ei_0a_episode_contract_probe.rs"
      - "lib/lib.rs"
      - "lib/Cargo.toml"
      - "docs/experiments/EI_0A_EPISODE_CONTRACTS.md"
      - ".github/workflows/ei-0a-contracts-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format disposable checkout and capture patch
        run: |
          rustfmt --edition 2021 \
            lib/emerging_intelligence/mod.rs \
            lib/examples/ei_0a_episode_contract_probe.rs
          git diff -- \
            lib/emerging_intelligence/mod.rs \
            lib/examples/ei_0a_episode_contract_probe.rs \
            > ei-0a-rustfmt.patch

      - name: Compile feature-gated contracts and probe
        run: |
          cargo check -p star --lib --features emerging-intelligence-contracts --locked
          cargo check -p star --example ei_0a_episode_contract_probe \
            --features emerging-intelligence-contracts --locked

      - name: Lint EI-0A contracts with warnings denied
        run: |
          cargo clippy -p star --lib --features emerging-intelligence-contracts --locked \
            -- -D warnings
          cargo clippy -p star --example ei_0a_episode_contract_probe \
            --features emerging-intelligence-contracts --locked -- -D warnings

      - name: Test EI-0A contracts deterministically
        run: >-
          cargo test -p star --lib --features emerging-intelligence-contracts --locked
          emerging_intelligence:: -- --test-threads=1

      - name: Run exact-replay probe twice
        run: |
          set -euo pipefail
          cargo run -p star --example ei_0a_episode_contract_probe \
            --features emerging-intelligence-contracts --locked \
            > ei-0a-contract-report.json
          cargo run -p star --example ei_0a_episode_contract_probe \
            --features emerging-intelligence-contracts --locked \
            > ei-0a-contract-report-replay.json
          cmp ei-0a-contract-report.json ei-0a-contract-report-replay.json
          grep -q '"classification": "pass"' ei-0a-contract-report.json
          grep -q '"authority_closed": true' ei-0a-contract-report.json
          grep -q '"runtime_wiring": false' ei-0a-contract-report.json

      - name: Preserve deterministic contract evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ei-0a-contract-report
          path: |
            ei-0a-contract-report.json
            ei-0a-contract-report-replay.json
            ei-0a-rustfmt.patch
          if-no-files-found: ignore
          retention-days: 30

      - name: Require committed Rustfmt output
        run: test ! -s ei-0a-rustfmt.patch
