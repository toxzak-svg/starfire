name: EI-0E Exact Source Materializer

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: ei-0e-exact-source-materializer
  cancel-in-progress: false

jobs:
  materialize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/ei-0e-terminal-preregistration'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out exact EI-0E branch
        uses: actions/checkout@v4
        with:
          ref: feat/ei-0e-terminal-preregistration
          fetch-depth: 0

      - name: Materialize exact preregistration sources
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          import json
          import shutil
          from pathlib import Path

          payload_dir = Path('tools/ei0e-materialization')
          expected = {
              'scripts/ei0e_preregistration.py',
              'docs/experiments/EI_0F_TERMINAL_REPORT.schema.json',
              'docs/experiments/EI_0E_TERMINAL_PREREGISTRATION.md',
              '.github/workflows/ei-0e-preregistration-ci.yml',
              'lib/examples/ei_0f_terminal_experiment.rs',
          }
          materialized = set()
          for prefix in ('a', 'b'):
              pieces = sorted(payload_dir.glob(f'{prefix}-*'))
              if not pieces:
                  raise SystemExit(f'missing payload fragments for {prefix}')
              raw = ''.join(piece.read_text(encoding='utf-8') for piece in pieces)
              payload = json.loads(raw)
              if payload.get('schema_version') != 1:
                  raise SystemExit('unsupported EI-0E payload schema')
              for path, encoded in payload.get('files', {}).items():
                  if path not in expected or path in materialized:
                      raise SystemExit(f'unexpected or duplicate target: {path}')
                  target = Path(path)
                  target.parent.mkdir(parents=True, exist_ok=True)
                  compressed = base64.b64decode(encoded, validate=True)
                  target.write_bytes(gzip.decompress(compressed))
                  materialized.add(path)
          if materialized != expected:
              raise SystemExit(f'incomplete target set: {sorted(expected - materialized)}')
          shutil.rmtree(payload_dir)
          Path('.github/workflows/ei-0e-materializer.yml').unlink()
          PY

      - name: Verify exact write scope
        run: |
          set -euo pipefail
          allowed='^(scripts/ei0e_preregistration.py|docs/experiments/EI_0F_TERMINAL_REPORT.schema.json|docs/experiments/EI_0E_TERMINAL_PREREGISTRATION.md|.github/workflows/ei-0e-preregistration-ci.yml|lib/examples/ei_0f_terminal_experiment.rs|tools/ei0e-materialization/|.github/workflows/ei-0e-materializer.yml)'
          unexpected="$(git status --short | awk '{print $2}' | grep -Ev "$allowed" || true)"
          if [ -n "$unexpected" ]; then
            printf 'Unexpected EI-0E materialization paths:\n%s\n' "$unexpected" >&2
            exit 1
          fi

      - name: Commit exact EI-0E sources
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(ei): materialize frozen EI-0E preregistration"
          git push origin HEAD:feat/ei-0e-terminal-preregistration
