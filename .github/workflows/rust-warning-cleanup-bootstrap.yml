name: Rust Warning Cleanup Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: rust-warning-cleanup-validation
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.pull_request.head.ref == 'maintenance/rust-warning-cleanup'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: maintenance/rust-warning-cleanup

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check all Starfire targets without warnings
        shell: bash
        run: |
          set -euo pipefail
          cargo check -p star --all-targets --locked 2>&1 | tee warning-cleanup-check.log
          ! grep -F "warning:" warning-cleanup-check.log

      - name: Run Starfire tests
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p star --locked 2>&1 | tee warning-cleanup-test.log

      - name: Upload final validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-warning-cleanup-final-validation
          path: |
            warning-cleanup-check.log
            warning-cleanup-test.log
          if-no-files-found: warn
