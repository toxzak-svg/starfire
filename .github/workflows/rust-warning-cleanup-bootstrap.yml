name: Rust Warning Cleanup Scoped Formatting

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: rust-warning-cleanup-formatting
  cancel-in-progress: false

jobs:
  format:
    if: >-
      github.event.pull_request.head.ref == 'maintenance/rust-warning-cleanup' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: maintenance/rust-warning-cleanup

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format CHARGE-scoped source
        run: rustfmt --edition 2021 lib/persistence/store.rs

      - name: Validate formatted source
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          cargo check -p star --all-targets --locked 2>&1 | tee warning-cleanup-check.log
          ! grep -F "warning:" warning-cleanup-check.log
          cargo test -p star --locked 2>&1 | tee warning-cleanup-test.log

      - name: Commit scoped formatting
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/persistence/store.rs
          if git diff --cached --quiet; then
            echo "Scoped source already formatted."
          else
            git commit -m "style: format persistence store after warning cleanup"
            git push origin HEAD:maintenance/rust-warning-cleanup
          fi
