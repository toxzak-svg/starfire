name: Rust Warning Cleanup Diff Compaction

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: rust-warning-cleanup-compaction
  cancel-in-progress: false

jobs:
  compact:
    if: >-
      github.event.pull_request.head.ref == 'maintenance/rust-warning-cleanup' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: maintenance/rust-warning-cleanup
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rebuild noisy files from semantic patches
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          files=(
            lib/personality/mod.rs
            lib/prediction/basin.rs
            lib/prediction/belief_revision.rs
            lib/prediction/meta_prediction.rs
          )
          for file in "${files[@]}"; do
            patch="$(mktemp)"
            git diff --ignore-all-space --no-ext-diff origin/main...HEAD -- "$file" > "$patch"
            git checkout origin/main -- "$file"
            if [ -s "$patch" ]; then
              git apply --ignore-whitespace "$patch"
            fi
            rm -f "$patch"
          done

      - name: Apply repository-scoped formatting
        run: rustfmt --edition 2021 lib/persistence/store.rs

      - name: Validate compacted source
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          cargo check -p star --all-targets --locked 2>&1 | tee warning-cleanup-check.log
          ! grep -F "warning:" warning-cleanup-check.log
          cargo test -p star --locked 2>&1 | tee warning-cleanup-test.log

      - name: Commit compacted diff
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/personality/mod.rs \
            lib/prediction/basin.rs \
            lib/prediction/belief_revision.rs \
            lib/prediction/meta_prediction.rs \
            lib/persistence/store.rs
          if git diff --cached --quiet; then
            echo "No diff compaction changes were needed."
          else
            git commit -m "chore: compact warning-cleanup diff and format scoped source"
            git push origin HEAD:maintenance/rust-warning-cleanup
          fi
