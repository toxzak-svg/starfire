name: EI-0F-R1 One-Shot Formatter

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/examples/ei_0f_r1_digest_remediation_probe.rs"
      - ".github/workflows/ei-0f-r1-one-shot-formatter.yml"

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.ref == 'experiment/ei-0f-r1-digest-remediation'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out remediation branch
        uses: actions/checkout@v4
        with:
          ref: experiment/ei-0f-r1-digest-remediation

      - name: Install Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply exact scoped Rustfmt
        run: |
          set -euo pipefail
          rustfmt --edition 2021 lib/examples/ei_0f_r1_digest_remediation_probe.rs
          if git diff --quiet -- lib/examples/ei_0f_r1_digest_remediation_probe.rs; then
            echo "Scoped file is already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/examples/ei_0f_r1_digest_remediation_probe.rs
          git commit -m "style(ei): apply exact EI-0F-R1 Rustfmt"
          git push origin HEAD:experiment/ei-0f-r1-digest-remediation
