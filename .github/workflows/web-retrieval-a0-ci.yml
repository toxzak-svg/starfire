name: Web Retrieval A0 CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - "lib/web_retrieval.rs"
      - ".github/workflows/web-retrieval-a0-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-retrieval-a0:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check scoped formatting
        run: |
          rustfmt --edition 2021 --check \
            lib/lib.rs \
            lib/web_retrieval.rs

      - name: Compile bounded retrieval feature
        run: |
          cargo check -p star --lib --features web-retrieval-a0 --locked

      - name: Lint bounded retrieval feature
        run: |
          cargo clippy -p star --lib --features web-retrieval-a0 --locked -- -D warnings

      - name: Run bounded retrieval contracts
        run: |
          cargo test -p star --lib --features web-retrieval-a0 --locked \
            web_retrieval:: -- --test-threads=1
