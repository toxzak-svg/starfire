name: CHARGE CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: charge-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  charge-contract:
    name: charge-contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Show Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Compile star crate and CHARGE probes
        run: |
          set -o pipefail
          cargo check -p star --all-targets --locked 2>&1 | tee charge-cargo-check.log

      - name: Run CHARGE and closed-cycle contract tests deterministically
        run: |
          set -o pipefail
          cargo test -p star charge:: --locked -- --test-threads=1 2>&1 | tee charge-test.log
          cargo test -p star cognitive_cycle:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log
          cargo test -p star environment:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log

      - name: Run real-component CHARGE specialization probe
        run: |
          set -o pipefail
          cargo run -p star --example charge_real_component_probe --locked \
            | tee charge-real-component-report.json

      - name: Run H4 shadow promotion transfer probe
        run: |
          set -o pipefail
          cargo run -p star --example h4_shadow_promotion_probe --locked \
            | tee h4-shadow-promotion-report.json

      - name: Reproduce frozen H4 real-cycle rejection diagnostically
        continue-on-error: true
        run: |
          set +e
          cargo run -p star --example h4_real_cycle_shadow_probe --locked 2>&1 \
            | tee h4-real-cycle-shadow-report.json
          h4_status=${PIPESTATUS[0]}
          set -e
          if [ "$h4_status" -ne 0 ]; then
            if grep -q '"status": "Rejected"' h4-real-cycle-shadow-report.json \
              && grep -q '"pass": false' h4-real-cycle-shadow-report.json; then
              echo "H4 real-cycle probe emitted the frozen scientific rejection; continuing."
            else
              exit "$h4_status"
            fi
          fi

      - name: Run H5 residual identity diagnostic
        run: |
          set -o pipefail
          cargo run -p star --example h5_residual_identity_diagnostic --locked 2>&1 \
            | tee h5-residual-identity-diagnostic-report.json

      - name: Run frozen H5-B non-memory identifiability diagnostic
        run: |
          set -o pipefail
          cargo run -p star --example h5_b_identifiability_probe --locked \
            | tee h5-b-identifiability-report.json

      - name: Preserve CHARGE diagnostics and reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: charge-real-component-diagnostics
          path: |
            charge-cargo-check.log
            charge-test.log
            charge-real-component-report.json
            h4-shadow-promotion-report.json
            h4-real-cycle-shadow-report.json
            h5-residual-identity-diagnostic-report.json
          if-no-files-found: ignore
          retention-days: 7
