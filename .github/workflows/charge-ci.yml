name: CHARGE CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: charge-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  charge-contract:
    name: charge-contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Persist variable-length residual control fix
        if: github.event_name == 'pull_request' && github.head_ref == 'h4-real-cycle-shadow-v2'
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git fetch origin "$PR_HEAD_REF"
          git checkout -B "$PR_HEAD_REF" "origin/$PR_HEAD_REF"
          python - <<'PY'
          from pathlib import Path

          path = Path("lib/examples/h4_real_cycle_shadow_probe.rs")
          text = path.read_text()
          old = '''    for dimension in 0..dimensions {
              let mut values: Vec<f32> = observations
                  .iter()
                  .map(|observation| observation.charge.residual[dimension])
                  .collect();
              values.shuffle(rng);
              for (observation, value) in observations.iter_mut().zip(values) {
                  observation.charge.residual[dimension] = value;
              }
          }
          '''
          new = '''    for dimension in 0..dimensions {
              let indices: Vec<usize> = observations
                  .iter()
                  .enumerate()
                  .filter(|(_, observation)| observation.charge.residual.len() > dimension)
                  .map(|(index, _)| index)
                  .collect();
              let mut values: Vec<f32> = indices
                  .iter()
                  .map(|index| observations[*index].charge.residual[dimension])
                  .collect();
              values.shuffle(rng);
              for (index, value) in indices.into_iter().zip(values) {
                  observations[index].charge.residual[dimension] = value;
              }
          }
          '''
          if old not in text:
              raise SystemExit(0)
          path.write_text(text.replace(old, new, 1))
          PY
          if git diff --quiet -- lib/examples/h4_real_cycle_shadow_probe.rs; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/examples/h4_real_cycle_shadow_probe.rs
          git commit -m "fix(experiment): permute only present residual dimensions"
          git push origin HEAD:"$PR_HEAD_REF"
          echo "Control implementation fix persisted; stop this superseded run before acceptance."
          exit 1

      - name: Show Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Compile star crate and CHARGE probes
        run: |
          set -o pipefail
          cargo check -p star --all-targets --locked 2>&1 | tee charge-cargo-check.log

      - name: Run CHARGE and closed-cycle contract tests deterministically
        run: |
          set -o pipefail
          cargo test -p star charge:: --locked -- --test-threads=1 2>&1 | tee charge-test.log
          cargo test -p star cognitive_cycle:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log
          cargo test -p star environment:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log

      - name: Run real-component CHARGE specialization probe
        run: |
          set -o pipefail
          cargo run -p star --example charge_real_component_probe --locked \
            | tee charge-real-component-report.json

      - name: Run H4 shadow promotion transfer probe
        run: |
          set -o pipefail
          cargo run -p star --example h4_shadow_promotion_probe --locked \
            | tee h4-shadow-promotion-report.json

      - name: Run H4 real closed-cycle shadow transfer probe
        run: |
          set -o pipefail
          cargo run -p star --example h4_real_cycle_shadow_probe --locked 2>&1 \
            | tee h4-real-cycle-shadow-report.json

      - name: Preserve CHARGE diagnostics and reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: charge-real-component-diagnostics
          path: |
            charge-cargo-check.log
            charge-test.log
            charge-real-component-report.json
            h4-shadow-promotion-report.json
            h4-real-cycle-shadow-report.json
          if-no-files-found: ignore
          retention-days: 7
