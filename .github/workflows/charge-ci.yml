name: CHARGE CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: charge-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  charge-contract:
    name: charge-contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Show Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Compile star crate and CHARGE probe
        run: cargo check -p star --all-targets --locked

      - name: Run CHARGE tests deterministically
        run: "cargo test -p star charge:: --locked -- --test-threads=1"

      - name: Run Rust CHARGE routing falsification probe
        run: |
          set -o pipefail
          cargo run -p star --example charge_routing_probe --locked \
            | tee charge-routing-report-rust.json

      - name: Preserve Rust CHARGE routing report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: charge-routing-report-rust
          path: charge-routing-report-rust.json
          if-no-files-found: ignore
          retention-days: 7
