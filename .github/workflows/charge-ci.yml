name: CHARGE CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: charge-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  charge-contract:
    name: charge-contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
    steps:
      - name: Checkout pull-request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Show Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Apply scoped rustfmt and push formatting-only commit
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          rustfmt --edition 2021 \
            lib/persistence/companion.rs \
            lib/persistence/store.rs \
            lib/persistence/mod.rs \
            lib/charge/mod.rs \
            lib/user_model/companion_projection.rs \
            lib/user_model/mod.rs
          if ! git diff --quiet -- \
            lib/persistence/companion.rs \
            lib/persistence/store.rs \
            lib/persistence/mod.rs \
            lib/charge/mod.rs \
            lib/user_model/companion_projection.rs \
            lib/user_model/mod.rs; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              lib/persistence/companion.rs \
              lib/persistence/store.rs \
              lib/persistence/mod.rs \
              lib/charge/mod.rs \
              lib/user_model/companion_projection.rs \
              lib/user_model/mod.rs
            git commit -m "style: apply scoped projection rustfmt"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Check scoped formatting
        run: |
          rustfmt --edition 2021 \
            lib/persistence/companion.rs \
            lib/persistence/store.rs \
            lib/persistence/mod.rs \
            lib/charge/mod.rs \
            lib/user_model/companion_projection.rs \
            lib/user_model/mod.rs
          git diff --exit-code -- \
            lib/persistence/companion.rs \
            lib/persistence/store.rs \
            lib/persistence/mod.rs \
            lib/charge/mod.rs \
            lib/user_model/companion_projection.rs \
            lib/user_model/mod.rs

      - name: Compile Star library and A1 probe
        run: |
          set -o pipefail
          cargo check -p star --lib --locked 2>&1 | tee charge-cargo-check.log
          cargo check -p star --example a1_bounded_autonomous_kernel --locked 2>&1 \
            | tee -a charge-cargo-check.log

      - name: Run CHARGE and closed-cycle contract tests deterministically
        run: |
          set -o pipefail
          cargo test -p star charge:: --locked -- --test-threads=1 2>&1 | tee charge-test.log
          cargo test -p star companion_state:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log
          cargo test -p star persistence::companion:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log
          cargo test -p star user_model::companion_projection:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log
          cargo test -p star cognitive_cycle:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log
          cargo test -p star environment:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log
          cargo test -p star autonomy:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log
          cargo test -p star commitment_state:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log
          cargo test -p star rule_induction:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log
          cargo test -p star graph_discovery:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log
          cargo test -p star representation_genesis:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log
          cargo test -p star representation_transport_orbit:: --locked -- --test-threads=1 2>&1 | tee -a charge-test.log

      - name: Run real-component CHARGE specialization probe
        run: |
          set -o pipefail
          cargo run -p star --example charge_real_component_probe --locked \
            | tee charge-real-component-report.json

      - name: Run H4 shadow promotion transfer probe
        run: |
          set -o pipefail
          cargo run -p star --example h4_shadow_promotion_probe --locked \
            | tee h4-shadow-promotion-report.json

      - name: Reproduce frozen H4 real-cycle rejection diagnostically
        continue-on-error: true
        run: |
          set +e
          cargo run -p star --example h4_real_cycle_shadow_probe --locked 2>&1 \
            | tee h4-real-cycle-shadow-report.json
          h4_status=${PIPESTATUS[0]}
          set -e
          if [ "$h4_status" -ne 0 ]; then
            if grep -q '"status": "Rejected"' h4-real-cycle-shadow-report.json \
              && grep -q '"pass": false' h4-real-cycle-shadow-report.json; then
              echo "H4 real-cycle probe emitted the frozen scientific rejection; continuing."
            else
              exit "$h4_status"
            fi
          fi

      - name: Run H5 residual identity diagnostic
        run: |
          set -o pipefail
          cargo run -p star --example h5_residual_identity_diagnostic --locked 2>&1 \
            | tee h5-residual-identity-diagnostic-report.json

      - name: Reproduce frozen H5-B non-memory identifiability verdict diagnostically
        continue-on-error: true
        run: |
          set +e
          cargo run -p star --example h5_b_identifiability_probe --locked 2>&1 \
            | tee h5-b-identifiability-report.json
          h5b_status=${PIPESTATUS[0]}
          set -e
          if [ "$h5b_status" -ne 0 ]; then
            if grep -q '"status": "NotIdentifiable"' h5-b-identifiability-report.json \
              && grep -q '"pass": false' h5-b-identifiability-report.json; then
              echo "H5-B emitted the frozen non-identifiable verdict; continuing to H6."
            else
              exit "$h5b_status"
            fi
          fi

      - name: Run H6 disagreement-induced contrast falsification probe
        run: |
          set -o pipefail
          cargo run -p star --example h6_disagreement_contrast_probe --locked \
            | tee h6-disagreement-contrast-report.json

      - name: Run H9 proof-carrying executable commitment probe
        run: |
          set -o pipefail
          cargo run -p star --example h9_executable_commitment_state --locked \
            | tee h9-executable-commitment-state-report.json

      - name: Run H10 evidence-bound rule induction probe
        run: |
          set -o pipefail
          cargo run -p star --example h10_evidence_bound_rule_induction --locked \
            | tee h10-evidence-bound-rule-induction-report.json

      - name: Run H11 graph-discovered relation induction probe
        run: |
          set -o pipefail
          cargo run -p star --example h11_graph_discovered_relation_induction --locked \
            | tee h11-graph-discovered-relation-induction-report.json

      - name: Run Ω1 endogenous state-space genesis probe
        run: |
          set -o pipefail
          cargo run -p star --example omega1_endogenous_state_space_genesis --locked \
            | tee omega1-endogenous-state-space-genesis-report.json

      - name: Run ΩR1 representative transportability probe
        run: |
          set -o pipefail
          cargo run -p star --example omega_r1_representative_transportability --locked \
            | tee omega-r1-representative-transportability-report.json

      - name: Run A1 bounded autonomous kernel foundation probe
        run: |
          set -o pipefail
          cargo run -p star --example a1_bounded_autonomous_kernel --locked \
            | tee a1-bounded-autonomous-kernel-report.json

      - name: Preserve CHARGE diagnostics and reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: charge-real-component-diagnostics
          path: |
            charge-cargo-check.log
            charge-test.log
            charge-real-component-report.json
            h4-shadow-promotion-report.json
            h4-real-cycle-shadow-report.json
            h5-residual-identity-diagnostic-report.json
            h5-b-identifiability-report.json
            h6-disagreement-contrast-report.json
            h9-executable-commitment-state-report.json
            h10-evidence-bound-rule-induction-report.json
            h11-graph-discovered-relation-induction-report.json
            omega1-endogenous-state-space-genesis-report.json
            omega-r1-representative-transportability-report.json
            a1-bounded-autonomous-kernel-report.json
          if-no-files-found: ignore
          retention-days: 7
