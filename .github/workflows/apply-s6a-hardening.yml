name: Apply S6-A authorization hardening

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/apply-s6a-hardening.yml"
      - ".s6a-hardening/**"

permissions:
  contents: write

jobs:
  apply-hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: experiment/s6a-reversible-live-policy-canary
          fetch-depth: 0

      - name: Apply reviewed source patches
        run: |
          git apply .s6a-hardening/module.patch
          git apply .s6a-hardening/probe.patch

      - name: Update contracts for state-version binding
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "docs/experiments/S6A_REVERSIBLE_LIVE_POLICY_CANARY.md": [
                  (
                      "- has verdict `PASS` and `promotion_eligible = true`;",
                      "- has verdict `PASS` and `promotion_eligible = true`;\n- is bound to the exact positive `CompanionState` version evaluated;",
                  ),
                  (
                      "4. installed promotion authorization;",
                      "4. installed promotion authorization bound to the current companion version;",
                  ),
                  (
                      "- authorization installation and removal;",
                      "- authorization installation and removal, including the authorized companion version;",
                  ),
              ],
              "docs/experiments/S6A_REVERSIBLE_LIVE_POLICY_CANARY_RESULT.md": [
                  (
                      "- rejection of synthetic S5-C authorization for live use;",
                      "- rejection of synthetic S5-C authorization for live use;\n- rejection of stale authorization after the companion-state version changes;",
                  ),
              ],
              "docs/INGEXUITY_STARFIRE_INTEGRATION.md": [
                  (
                      "- explicit promotion authorization tied to one passing S5-C report fingerprint and one canonical artifact digest;",
                      "- explicit promotion authorization tied to one passing S5-C report fingerprint, one canonical artifact digest, and the exact evaluated companion-state version;",
                  ),
                  (
                      "- exact neutral fallback for missing authorization, rollout exclusion, abstention, sensitive evidence, claim-budget failure, compute-budget failure, and rollback;",
                      "- exact neutral fallback for missing or stale authorization, rollout exclusion, abstention, sensitive evidence, claim-budget failure, compute-budget failure, and rollback;",
                  ),
              ],
          }

          for filename, pairs in replacements.items():
              path = Path(filename)
              text = path.read_text()
              for old, new in pairs:
                  if old not in text:
                      raise SystemExit(f"missing frozen replacement in {filename}: {old}")
                  text = text.replace(old, new, 1)
              path.write_text(text)
          PY

      - name: Remove one-shot staging files
        run: |
          rm -rf .s6a-hardening
          rm .github/workflows/apply-s6a-hardening.yml

      - name: Commit hardened canary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(companion): bind S6-A authorization to companion version"
          git push origin HEAD:experiment/s6a-reversible-live-policy-canary
