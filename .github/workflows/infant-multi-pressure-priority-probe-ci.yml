name: Infant Multi-Pressure Priority Probe CI

on:
  pull_request:
    branches:
      - experiment/infant-typed-pressure-routing-probe
      - experiment/infant-multi-pressure-priority-probe
    paths:
      - "lib/examples/h_infant_multi_pressure_priority_probe.rs"
      - "docs/experiments/H_INFANT_MULTI_PRESSURE_PRIORITY_PROBE.md"
      - ".github/workflows/infant-multi-pressure-priority-probe-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: infant-multi-pressure-priority-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  multi-pressure-priority-probe:
    name: multi-pressure-priority-probe
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run frozen-gate multi-pressure priority probe
        run: |
          mkdir -p artifacts
          set -o pipefail
          cargo run -p star --example h_infant_multi_pressure_priority_probe \
            --features developmental-evidence --locked 2>&1 \
            | tee artifacts/h_infant_multi_pressure_priority_probe.json

      - name: Upload probe artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: h-infant-multi-pressure-priority-probe
          path: artifacts/h_infant_multi_pressure_priority_probe.json
          if-no-files-found: warn
          retention-days: 14
