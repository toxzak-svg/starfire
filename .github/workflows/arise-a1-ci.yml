name: ARISE-A1 Typed Program Shadow CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/arise_edge/**"
      - "lib/arise_typed_plan_shadow.rs"
      - "lib/arise_response_shadow_ext.rs"
      - "lib/examples/arise_a0_edge_bridge.rs"
      - "lib/examples/arise_a1_typed_program_shadow.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - "docs/experiments/ARISE_A1_TYPED_PROGRAM_SHADOW.md"
      - ".github/workflows/arise-a1-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  arise-a1-typed-program-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check scoped formatting
        run: |
          rustfmt --edition 2021 --check \
            lib/arise_edge/mod.rs \
            lib/arise_edge/types.rs \
            lib/arise_edge/engine.rs \
            lib/arise_edge/runtime_shadow.rs \
            lib/arise_typed_plan_shadow.rs \
            lib/arise_response_shadow_ext.rs \
            lib/examples/arise_a0_edge_bridge.rs \
            lib/examples/arise_a1_typed_program_shadow.rs

      - name: Confirm default build remains unchanged
        run: cargo check -p star --lib --locked

      - name: Compile A0 and A1 feature stacks
        run: |
          cargo check -p star --lib --features arise-edge --locked
          cargo check -p star --example arise_a0_edge_bridge --features arise-edge --locked
          cargo check -p star --lib --features arise-typed-plan --locked
          cargo check -p star --example arise_a1_typed_program_shadow --features arise-typed-plan --locked

      - name: Lint scoped ARISE sources
        run: |
          set -o pipefail
          cargo clippy -p star --lib --features arise-typed-plan --locked --message-format=short \
            2>&1 | tee arise-a1-clippy.log
          cargo clippy -p star --example arise_a1_typed_program_shadow \
            --features arise-typed-plan --locked --message-format=short \
            2>&1 | tee -a arise-a1-clippy.log
          if grep -E 'lib/arise_edge/|lib/arise_typed_plan_shadow.rs|lib/arise_response_shadow_ext.rs|lib/examples/arise_a[01]_' arise-a1-clippy.log | grep -E 'warning:|error:'; then
            echo "ARISE-A0/A1 scoped Clippy finding detected"
            exit 1
          fi

      - name: Run A0 regression contracts
        run: |
          cargo test -p star --lib --features arise-typed-plan --locked \
            arise_edge:: -- --test-threads=1

      - name: Run A1 typed-program contracts
        run: |
          cargo test -p star --lib --features arise-typed-plan --locked \
            arise_typed_plan_shadow:: -- --test-threads=1

      - name: Run deterministic A0 probe
        run: |
          cargo run -p star --example arise_a0_edge_bridge --features arise-edge --locked \
            > arise-a0-report.json
          cargo run -p star --example arise_a0_edge_bridge --features arise-edge --locked \
            > arise-a0-replay.json
          cmp arise-a0-report.json arise-a0-replay.json
          grep -F '"terminal_classification": "Pass"' arise-a0-report.json
          grep -F '"final_residual": 0' arise-a0-report.json

      - name: Run deterministic A1 probe
        run: |
          cargo run -p star --example arise_a1_typed_program_shadow --features arise-typed-plan --locked \
            > arise-a1-report.json
          cargo run -p star --example arise_a1_typed_program_shadow --features arise-typed-plan --locked \
            > arise-a1-replay.json
          cmp arise-a1-report.json arise-a1-replay.json
          grep -F '"terminal_classification": "Pass"' arise-a1-report.json
          grep -F '"initial_residual": 2' arise-a1-report.json
          grep -F '"final_residual": 0' arise-a1-report.json

      - name: Preserve evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arise-a1-typed-program-shadow-ci
          path: |
            arise-a0-report.json
            arise-a0-replay.json
            arise-a1-report.json
            arise-a1-replay.json
            arise-a1-clippy.log
          if-no-files-found: ignore
          retention-days: 30
