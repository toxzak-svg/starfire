name: EI-0D Exact Source Materializer

on:
  pull_request_target:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: ei-0d-exact-source-materializer
  cancel-in-progress: false

jobs:
  materialize:
    if: >-
      github.event.pull_request.number == 194 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/ei-0d-reversible-updates'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out exact EI-0D branch
        uses: actions/checkout@v4
        with:
          ref: feat/ei-0d-reversible-updates
          fetch-depth: 0

      - name: Materialize exact bounded source payload
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          import json
          from pathlib import Path

          payload_path = Path('tools/ei0d-materialization.json')
          payload = json.loads(payload_path.read_text(encoding='utf-8'))
          if payload.get('schema_version') != 1:
              raise SystemExit('unsupported EI-0D materialization schema')

          targets = {
              'updates.rs': Path('lib/emerging_intelligence/updates.rs'),
              'probe.rs': Path('lib/examples/ei_0d_reversible_update_probe.rs'),
          }
          if set(payload.get('files', {})) != set(targets):
              raise SystemExit('unexpected EI-0D payload keys')

          for key, target in targets.items():
              target.parent.mkdir(parents=True, exist_ok=True)
              compressed = base64.b64decode(payload['files'][key], validate=True)
              target.write_bytes(gzip.decompress(compressed))

          cargo = Path('lib/Cargo.toml')
          text = cargo.read_text(encoding='utf-8')
          example_anchor = '''[[example]]
          name = "ei_0c_append_only_ledger_probe"
          path = "examples/ei_0c_append_only_ledger_probe.rs"
          required-features = ["emerging-intelligence-ledger"]
          '''.replace('          ', '')
          example = '''
          [[example]]
          name = "ei_0d_reversible_update_probe"
          path = "examples/ei_0d_reversible_update_probe.rs"
          required-features = ["emerging-intelligence-updates"]
          '''.replace('          ', '')
          if 'name = "ei_0d_reversible_update_probe"' not in text:
              if example_anchor not in text:
                  raise SystemExit('missing EI-0C example anchor')
              text = text.replace(example_anchor, example_anchor + example)

          feature_anchor = 'emerging-intelligence-ledger = ["emerging-intelligence-contracts"]  # EI-0C append-only canonical episode ledger and fresh-state replay; offline-only\n'
          feature = 'emerging-intelligence-updates = ["emerging-intelligence-environment", "emerging-intelligence-ledger"]  # EI-0D fixed-schema reversible updates and rollback; offline-only\n'
          if feature not in text:
              if feature_anchor not in text:
                  raise SystemExit('missing EI-0C feature anchor')
              text = text.replace(feature_anchor, feature_anchor + feature)
          cargo.write_text(text, encoding='utf-8')

          lib = Path('lib/lib.rs')
          text = lib.read_text(encoding='utf-8')
          module_anchor = '''#[cfg(feature = "emerging-intelligence-ledger")]
          #[path = "emerging_intelligence/ledger.rs"]
          pub mod emerging_intelligence_ledger;
          '''.replace('          ', '')
          module = '''
          // EI-0D: provenance-bound fixed-schema learning updates, independent held-out
          // safety evaluation, atomic apply, and byte-exact rollback. Offline-only with no
          // live persistence, runtime, response, routing, belief, ontology, tool, or
          // autonomous-action authority.
          #[cfg(feature = "emerging-intelligence-updates")]
          #[path = "emerging_intelligence/updates.rs"]
          pub mod emerging_intelligence_updates;
          '''.replace('          ', '')
          if 'pub mod emerging_intelligence_updates;' not in text:
              if module_anchor not in text:
                  raise SystemExit('missing EI-0C module anchor')
              text = text.replace(module_anchor, module_anchor + module)
          lib.write_text(text, encoding='utf-8')

          payload_path.unlink()
          PY

      - name: Verify materialization scope
        run: |
          set -euo pipefail
          allowed='^(lib/emerging_intelligence/updates.rs|lib/examples/ei_0d_reversible_update_probe.rs|lib/Cargo.toml|lib/lib.rs|tools/ei0d-materialization.json)$'
          unexpected="$(git status --short | awk '{print $2}' | grep -Ev "$allowed" || true)"
          if [ -n "$unexpected" ]; then
            printf 'Unexpected EI-0D materialization paths:\n%s\n' "$unexpected" >&2
            exit 1
          fi

      - name: Commit exact EI-0D sources
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/emerging_intelligence/updates.rs \
            lib/examples/ei_0d_reversible_update_probe.rs \
            lib/Cargo.toml \
            lib/lib.rs \
            tools/ei0d-materialization.json
          git commit -m "feat(ei): materialize reversible update kernel"
          git push origin HEAD:feat/ei-0d-reversible-updates
