# Disposable trigger revision for PR synchronization.
name: Rust Warning Cleanup Autofix

on:
  push:
    branches:
      - maintenance/rust-warning-cleanup
  pull_request:
    branches:
      - main
    paths:
      - "lib/**"
      - ".github/workflows/rust-warning-cleanup-autofix.yml"

permissions:
  contents: write

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: maintenance/rust-warning-cleanup

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply compiler suggestions by target
        shell: bash
        run: |
          set -uo pipefail
          : > cargo-fix.log
          for target in --lib --tests --examples; do
            echo "===== cargo fix ${target} =====" | tee -a cargo-fix.log
            cargo fix -p star "${target}" --locked --allow-dirty --allow-staged 2>&1 \
              | tee -a cargo-fix.log || true
          done

      - name: Apply reviewed warning fixes
        shell: python
        run: |
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"expected one match in {path}, found {count}: {old!r}")
              file.write_text(text.replace(old, new))

          # H5-B intentionally includes the complete frozen H4 executable as a fixture,
          # while exercising only the observation path. Scope the allowance to that
          # fixture module instead of suppressing dead-code warnings crate-wide.
          replace(
              "lib/examples/h5_b_identifiability_probe.rs",
              'mod frozen_h4_fixture {\n',
              '#[allow(dead_code)]\nmod frozen_h4_fixture {\n',
          )

          # Keep basin internals encapsulated, make the configured node budget real,
          # and stop storing the node identifier twice.
          replace(
              "lib/prediction/basin.rs",
              '    pub nodes: HashMap<NodeId, BasinNode>,\n',
              '    nodes: HashMap<NodeId, BasinNode>,\n',
          )
          replace(
              "lib/prediction/basin.rs",
              '    pub id: NodeId,\n',
              '',
          )
          replace(
              "lib/prediction/basin.rs",
              '''        let node_id = NodeId::new(id);
        
        // Generate alternatives based on value type
''',
              '''        let node_id = NodeId::new(id);
        if self.nodes.len() >= self.max_nodes && !self.nodes.contains_key(&node_id) {
            return;
        }

        // Generate alternatives based on value type
''',
          )
          replace(
              "lib/prediction/basin.rs",
              '''        self.nodes.insert(node_id.clone(), BasinNode {
            id: node_id,
''',
              '''        self.nodes.insert(node_id, BasinNode {
''',
          )
          replace(
              "lib/prediction/basin.rs",
              '        let node = self.nodes.get(node_id)?;\n',
              '''        if !self.nodes.contains_key(node_id) {
            return None;
        }
''',
          )

          # Replace tests whose unsigned-length comparisons could never fail.
          replace(
              "lib/prediction/basin.rs",
              '        assert!(!predictions.is_empty() || predictions.len() >= 0);\n',
              '''        assert!(
            !predictions.is_empty(),
            "a causal constraint should produce an equilibrium prediction"
        );
''',
          )
          replace(
              "lib/input_normalizer/mod.rs",
              '        assert!(result.uncertain_tokens.len() >= 0);\n',
              '        assert!(result.markers.has_emoji);\n',
          )
          replace(
              "lib/input_normalizer/mod.rs",
              '        assert!(result.uncertain_tokens.len() >= 0);\n',
              '        assert!(!result.uncertain_tokens.is_empty());\n',
          )

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit cleanup changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib
          if git diff --cached --quiet; then
            echo "No cleanup changes were produced."
            exit 0
          fi
          git commit -m "chore: reduce Rust warnings and repair vacuous tests"
          git push origin HEAD:maintenance/rust-warning-cleanup

      - name: Check all Starfire targets
        continue-on-error: true
        run: cargo check -p star --all-targets --locked 2>&1 | tee warning-cleanup-check.log

      - name: Run Starfire tests
        continue-on-error: true
        run: cargo test -p star --locked 2>&1 | tee warning-cleanup-test.log

      - name: Upload warning inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-warning-cleanup-check
          path: |
            cargo-fix.log
            warning-cleanup-check.log
            warning-cleanup-test.log
          if-no-files-found: warn
