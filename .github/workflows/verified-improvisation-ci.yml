name: Verified Improvisation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/verified_improvisation.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - ".github/workflows/verified-improvisation-ci.yml"
      - "docs/experiments/STLM_L1A_VERIFIED_IMPROVISATION.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verified-improvisation:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Repair evaluator attribute placement
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          marker = "#![allow(dead_code, clippy::type_complexity)]\n"
          root = Path("lib/examples/omega_v1f1_offline_evaluation.rs")
          root_text = root.read_text()
          if not root_text.startswith(marker):
              root.write_text(marker + root_text)

          for part in sorted(Path("lib/examples/omega_v1f1_eval").glob("part*.rs")):
              text = part.read_text()
              if not text.startswith(marker):
                  raise SystemExit(f"missing expected marker in {part}")
              part.write_text(text[len(marker):])
          PY
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/examples/omega_v1f1_offline_evaluation.rs \
            lib/examples/omega_v1f1_eval/part*.rs
          git commit -m "fix(language): place evaluator lint attribute at crate root"
          git push
