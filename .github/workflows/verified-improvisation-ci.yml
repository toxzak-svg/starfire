name: Verified Improvisation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/verified_improvisation.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - ".github/workflows/verified-improvisation-ci.yml"
      - "docs/experiments/STLM_L1A_VERIFIED_IMPROVISATION.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verified-improvisation:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Restore test-local import
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("lib/learned_expression/mod.rs")
          text = path.read_text()
          old = """        DiscourseOperation, EpistemicConstraint, OutputBudget, ProhibitedClaim, ResponseProgramId,
          """
          new = """        DiscourseOperation, EpistemicConstraint, EpistemicStatus, OutputBudget, ProhibitedClaim,
                  ResponseProgramId,
          """
          if text.count(old) != 1:
              raise SystemExit(f"expected exactly one test import pattern, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1))
          PY
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/learned_expression/mod.rs
          git commit -m "fix(language): restore test-local epistemic status import"
          git push
