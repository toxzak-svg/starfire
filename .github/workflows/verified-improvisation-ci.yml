name: Verified Improvisation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/verified_improvisation.rs"
      - "lib/web_retrieval.rs"
      - "lib/web_search_searxng.rs"
      - "lib/web_content_extract.rs"
      - "lib/web_research.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - ".github/workflows/verified-improvisation-ci.yml"
      - ".github/workflows/web-retrieval-ci.yml"
      - "docs/experiments/STLM_L1A_VERIFIED_IMPROVISATION.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verified-improvisation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: |
          rustfmt --edition 2021 --check lib/verified_improvisation.rs
          rustfmt --edition 2021 --config skip_children=true --check lib/lib.rs

      - name: Compile scoped feature
        run: cargo check -p star --lib --features verified-improvisation --locked

      - name: Lint scoped feature
        run: |
          set -o pipefail
          cargo clippy -p star --lib --features verified-improvisation --locked \
            --message-format=short 2>&1 | tee verified-improvisation-clippy.log
          if grep -E 'lib/verified_improvisation\.rs|lib/lib\.rs' \
            verified-improvisation-clippy.log; then
            echo "Verified improvisation scoped Clippy finding detected"
            exit 1
          fi

      - name: Run verifier-backed improvisation contracts
        run: |
          set -o pipefail
          cargo test -p star --lib --features verified-improvisation --locked \
            verified_improvisation:: -- --test-threads=1 --nocapture \
            2>&1 | tee verified-improvisation-test.log

      - name: Preserve diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verified-improvisation-ci
          path: |
            verified-improvisation-clippy.log
            verified-improvisation-test.log
          if-no-files-found: ignore
          retention-days: 30

  web-retrieval-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check scoped formatting
        run: |
          rustfmt --edition 2021 --config skip_children=true --check lib/lib.rs
          rustfmt --edition 2021 --check lib/web_retrieval.rs lib/web_search_searxng.rs lib/web_content_extract.rs lib/web_research.rs

      - name: Compile retrieval features
        run: cargo check -p star --lib --features web-search-searxng --locked

      - name: Lint retrieval features
        run: cargo clippy -p star --lib --features web-search-searxng --locked -- -D warnings

      - name: Test bounded retrieval contracts
        run: cargo test -p star --lib --features web-search-searxng --locked web_retrieval:: -- --test-threads=1

      - name: Test SearXNG provider contracts
        run: cargo test -p star --lib --features web-search-searxng --locked web_search_searxng:: -- --test-threads=1

      - name: Test extraction contracts
        run: cargo test -p star --lib --features web-search-searxng --locked web_content_extract:: -- --test-threads=1

      - name: Test orchestration contracts
        run: cargo test -p star --lib --features web-search-searxng --locked web_research:: -- --test-threads=1
