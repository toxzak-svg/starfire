name: Verified Improvisation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/verified_improvisation.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - ".github/workflows/verified-improvisation-ci.yml"
      - "docs/experiments/STLM_L1A_VERIFIED_IMPROVISATION.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verified-improvisation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Normalize source and fixture
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("lib/verified_improvisation.rs")
          text = path.read_text()
          old = """            confidence_bps: 8_000,
                      epistemic_status: status,
          """
          new = """            confidence_bps: match status {
                          EpistemicStatus::Certain => 9_500,
                          EpistemicStatus::Probable => 8_000,
                          EpistemicStatus::Possible => 4_000,
                          EpistemicStatus::Uncertain => 3_000,
                          EpistemicStatus::Unknown => 0,
                      },
                      epistemic_status: status,
          """
          if old in text:
              text = text.replace(old, new, 1)
              path.write_text(text)
          elif new not in text:
              raise SystemExit("fixture confidence pattern not found")
          PY
          rustfmt --edition 2021 lib/verified_improvisation.rs lib/lib.rs
          cargo clippy --fix -p star --lib --features verified-improvisation --locked \
            --allow-dirty --allow-staged -- -D warnings || true
          rustfmt --edition 2021 lib/verified_improvisation.rs lib/lib.rs
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add lib/verified_improvisation.rs lib/lib.rs
            git commit -m "style(language): apply scoped clippy fixes"
            git push
          fi

      - name: Check formatting
        run: |
          rustfmt --edition 2021 --check \
            lib/verified_improvisation.rs \
            lib/lib.rs

      - name: Compile scoped feature
        run: cargo check -p star --lib --features verified-improvisation --locked

      - name: Lint scoped feature
        run: |
          cargo clippy -p star --lib --features verified-improvisation --locked \
            --message-format=short -- -D warnings

      - name: Run verifier-backed improvisation contracts
        run: |
          cargo test -p star --lib --features verified-improvisation --locked \
            verified_improvisation:: -- --test-threads=1
