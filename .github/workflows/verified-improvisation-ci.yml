name: Verified Improvisation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/verified_improvisation.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - ".github/workflows/verified-improvisation-ci.yml"
      - "docs/experiments/STLM_L1A_VERIFIED_IMPROVISATION.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verified-improvisation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Normalize all scoped Rust sources
        run: |
          rustfmt --edition 2021 \
            lib/verified_improvisation.rs \
            lib/lib.rs \
            lib/learned_expression/mod.rs \
            lib/omega_v1f1_projection_guard.rs \
            lib/examples/omega_v1f1_offline_evaluation.rs \
            lib/examples/omega_v1f1_eval/*.rs
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              lib/verified_improvisation.rs \
              lib/lib.rs \
              lib/learned_expression/mod.rs \
              lib/omega_v1f1_projection_guard.rs \
              lib/examples/omega_v1f1_offline_evaluation.rs \
              lib/examples/omega_v1f1_eval/*.rs
            git commit -m "style(language): normalize scoped Rust formatting"
            git push
          fi
