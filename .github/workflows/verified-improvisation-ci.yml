name: Verified Improvisation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/verified_improvisation.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - ".github/workflows/verified-improvisation-ci.yml"
      - "docs/experiments/STLM_L1A_VERIFIED_IMPROVISATION.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verified-improvisation:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Normalize evaluator repairs
        run: |
          rustfmt --edition 2021 \
            lib/examples/omega_v1f1_eval/surface_diversity.rs \
            lib/examples/omega_v1f1_eval/surface_diversity_v2.rs \
            lib/examples/omega_v1f1_eval/part3.rs
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/examples/omega_v1f1_eval/surface_diversity.rs \
            lib/examples/omega_v1f1_eval/surface_diversity_v2.rs \
            lib/examples/omega_v1f1_eval/part3.rs
          git commit -m "style(language): format evaluator lint repairs"
          git push
