name: Verified Improvisation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/verified_improvisation.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - ".github/workflows/verified-improvisation-ci.yml"
      - "docs/experiments/STLM_L1A_VERIFIED_IMPROVISATION.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verified-improvisation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: |
          rustfmt --edition 2021 --check lib/verified_improvisation.rs
          rustfmt --edition 2021 --config skip_children=true --check lib/lib.rs

      - name: Compile scoped feature
        run: cargo check -p star --lib --features verified-improvisation --locked

      - name: Lint scoped feature
        run: |
          set -o pipefail
          cargo clippy -p star --lib --features verified-improvisation --locked \
            --message-format=short 2>&1 | tee verified-improvisation-clippy.log
          if grep -E 'lib/verified_improvisation\.rs|lib/lib\.rs' \
            verified-improvisation-clippy.log; then
            echo "Verified improvisation scoped Clippy finding detected"
            exit 1
          fi

      - name: Run verifier-backed improvisation contracts
        run: |
          set -o pipefail
          cargo test -p star --lib --features verified-improvisation --locked \
            verified_improvisation:: -- --test-threads=1 --nocapture \
            2>&1 | tee verified-improvisation-test.log

      - name: Preserve diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verified-improvisation-ci
          path: |
            verified-improvisation-clippy.log
            verified-improvisation-test.log
          if-no-files-found: ignore
          retention-days: 30
