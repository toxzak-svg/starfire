name: Verified Improvisation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/verified_improvisation.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - ".github/workflows/verified-improvisation-ci.yml"
      - "docs/experiments/STLM_L1A_VERIFIED_IMPROVISATION.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verified-improvisation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Apply evaluator-only Clippy fixes
        run: |
          cargo clippy --fix -p star --example omega_v1f1_offline_evaluation \
            --features omega-v1-learned-expression --locked \
            --allow-dirty --allow-staged
          rustfmt --edition 2021 \
            lib/examples/omega_v1f1_offline_evaluation.rs \
            lib/examples/omega_v1f1_eval/*.rs
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/examples/omega_v1f1_offline_evaluation.rs \
            lib/examples/omega_v1f1_eval/*.rs
          git commit -m "chore(language): apply evaluator Clippy fixes"
          git push
