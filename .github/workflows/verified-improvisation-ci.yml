name: Verified Improvisation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/verified_improvisation.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - ".github/workflows/verified-improvisation-ci.yml"
      - "docs/experiments/STLM_L1A_VERIFIED_IMPROVISATION.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verified-improvisation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Normalize scoped F2 Rust sources
        run: |
          rustfmt --edition 2021 lib/api.rs
          rustfmt --edition 2021 --config skip_children=true lib/lib.rs
          rustfmt --edition 2021 \
            lib/omega_v1f1r1_surface.rs \
            lib/omega_v1f1r1_claim_first.rs \
            lib/omega_v1f2_shadow.rs \
            lib/examples/omega_v1f1_model_export.rs \
            lib/examples/omega_v1f2_shadow_probe.rs \
            lib/examples/omega_v1f2_ledger_report.rs
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              lib/api.rs \
              lib/lib.rs \
              lib/omega_v1f1r1_surface.rs \
              lib/omega_v1f1r1_claim_first.rs \
              lib/omega_v1f2_shadow.rs \
              lib/examples/omega_v1f1_model_export.rs \
              lib/examples/omega_v1f2_shadow_probe.rs \
              lib/examples/omega_v1f2_ledger_report.rs
            git commit -m "style(language): normalize scoped F2 Rust sources"
            git push
          fi
