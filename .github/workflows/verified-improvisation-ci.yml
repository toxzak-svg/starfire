name: Verified Improvisation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/verified_improvisation.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - ".github/workflows/verified-improvisation-ci.yml"
      - "docs/experiments/STLM_L1A_VERIFIED_IMPROVISATION.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verified-improvisation:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Repair model exporter lint
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("lib/examples/omega_v1f1_model_export.rs")
          text = path.read_text()
          old = "let values = if suffix % 2 == 0 {"
          new = "let values = if suffix.is_multiple_of(2) {"
          if text.count(old) != 1:
              raise SystemExit(f"expected one exporter parity check, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1))
          PY
          rustfmt --edition 2021 lib/examples/omega_v1f1_model_export.rs
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/examples/omega_v1f1_model_export.rs
          git commit -m "chore(language): resolve model exporter lint finding"
          git push
