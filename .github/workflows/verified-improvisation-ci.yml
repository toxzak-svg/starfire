name: Verified Improvisation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/verified_improvisation.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - ".github/workflows/verified-improvisation-ci.yml"
      - "docs/experiments/STLM_L1A_VERIFIED_IMPROVISATION.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verified-improvisation:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply explicit evaluator lint repairs
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              Path("lib/examples/omega_v1f1_eval/surface_diversity.rs"): [
                  (
                      "&& index % operations_per_paragraph == 0",
                      "&& index.is_multiple_of(operations_per_paragraph)",
                  ),
              ],
              Path("lib/examples/omega_v1f1_eval/surface_diversity_v2.rs"): [
                  (
                      ".trim_end_matches(|character| matches!(character, '.' | '?' | '!'));",
                      ".trim_end_matches(['.', '?', '!']);",
                  ),
                  (
                      "&& index % operations_per_paragraph == 0",
                      "&& index.is_multiple_of(operations_per_paragraph)",
                  ),
              ],
              Path("lib/examples/omega_v1f1_eval/part3.rs"): [
                  ("let v = if n % 2 == 0 {", "let v = if n.is_multiple_of(2) {"),
              ],
          }

          for path, changes in replacements.items():
              text = path.read_text()
              for old, new in changes:
                  count = text.count(old)
                  if count != 1:
                      raise SystemExit(f"expected one match in {path} for {old!r}, found {count}")
                  text = text.replace(old, new, 1)
              path.write_text(text)
          PY
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/examples/omega_v1f1_eval/surface_diversity.rs \
            lib/examples/omega_v1f1_eval/surface_diversity_v2.rs \
            lib/examples/omega_v1f1_eval/part3.rs
          git commit -m "chore(language): resolve evaluator lint findings"
          git push
