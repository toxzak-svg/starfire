name: Apply S6-A companion-version binding

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
    paths:
      - ".github/workflows/apply-s6a-version-binding.yml"
      - ".github/scripts/apply_s6a_version_binding.py"

permissions:
  contents: write

jobs:
  apply-version-binding:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out hardening branch
        uses: actions/checkout@v4
        with:
          ref: fix/s6a-version-bound-live-policy
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply reviewed version-binding transformation
        run: python .github/scripts/apply_s6a_version_binding.py

      - name: Format and verify hardening
        run: |
          rustfmt --edition 2021 \
            lib/companion_bounded_live_policy.rs \
            lib/examples/s6a_bounded_live_policy_probe.rs
          cargo check -p star --lib --features companion-bounded-live-policy --locked
          cargo test -p star --lib --features companion-bounded-live-policy --locked \
            companion_bounded_live_policy:: -- --test-threads=1
          cargo run -p star --example s6a_bounded_live_policy_probe \
            --features companion-bounded-live-policy --locked

      - name: Remove one-shot machinery
        run: |
          rm .github/workflows/apply-s6a-version-binding.yml
          rm .github/scripts/apply_s6a_version_binding.py

      - name: Commit version-bound canary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(companion): bind S6-A authorization to companion version"
          git push origin HEAD:fix/s6a-version-bound-live-policy
