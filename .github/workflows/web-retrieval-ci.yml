# Isolated validation trigger for PR #160. Do not merge.
name: Web Retrieval CI

on:
  pull_request:
    branches:
      - validation/web-retrieval-final-base
    paths:
      - "lib/web_retrieval.rs"
      - "lib/web_search_searxng.rs"
      - "lib/web_content_extract.rs"
      - "lib/web_research.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - "scripts/check_web_retrieval_a0.sh"
      - ".github/workflows/web-retrieval-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-retrieval:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check scoped formatting
        run: |
          rustfmt --edition 2021 --config skip_children=true --check lib/lib.rs
          rustfmt --edition 2021 --check \
            lib/web_retrieval.rs \
            lib/web_search_searxng.rs \
            lib/web_content_extract.rs \
            lib/web_research.rs

      - name: Compile retrieval features
        run: cargo check -p star --lib --features web-search-searxng --locked

      - name: Lint retrieval features
        run: cargo clippy -p star --lib --features web-search-searxng --locked -- -D warnings

      - name: Test bounded retrieval contracts
        run: cargo test -p star --lib --features web-search-searxng --locked web_retrieval:: -- --test-threads=1

      - name: Test SearXNG provider contracts
        run: cargo test -p star --lib --features web-search-searxng --locked web_search_searxng:: -- --test-threads=1

      - name: Test extraction contracts
        run: cargo test -p star --lib --features web-search-searxng --locked web_content_extract:: -- --test-threads=1

      - name: Test orchestration contracts
        run: cargo test -p star --lib --features web-search-searxng --locked web_research:: -- --test-threads=1
