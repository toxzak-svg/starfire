name: Companion Live Policy S6-B CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/companion_bounded_live_policy.rs"
      - "lib/examples/s6a_bounded_live_policy_probe.rs"
      - "lib/examples/s6b_adversarial_live_policy_stress.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - "docs/experiments/S6B_ADVERSARIAL_LIVE_POLICY_STRESS.md"
      - "docs/experiments/S6B_ADVERSARIAL_LIVE_POLICY_STRESS_RESULT.md"
      - ".github/workflows/companion-live-policy-s6b-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  s6b-adversarial-live-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check S6-A and S6-B formatting
        run: |
          rustfmt --edition 2021 --check \
            lib/companion_bounded_live_policy.rs \
            lib/examples/s6a_bounded_live_policy_probe.rs \
            lib/examples/s6b_adversarial_live_policy_stress.rs

      - name: Compile hardened controller and probes
        run: |
          cargo check -p star --lib --features companion-live-policy-stress --locked
          cargo check -p star --example s6a_bounded_live_policy_probe \
            --features companion-live-policy-stress --locked
          cargo check -p star --example s6b_adversarial_live_policy_stress \
            --features companion-live-policy-stress --locked

      - name: Lint scoped S6 sources
        run: |
          set -o pipefail
          {
            cargo clippy -p star --lib --features companion-live-policy-stress --locked \
              --message-format=short
            cargo clippy -p star --example s6a_bounded_live_policy_probe \
              --features companion-live-policy-stress --locked --message-format=short
            cargo clippy -p star --example s6b_adversarial_live_policy_stress \
              --features companion-live-policy-stress --locked --message-format=short
          } 2>&1 | tee s6b-clippy.log
          if grep -E \
            'lib/companion_bounded_live_policy\.rs:|lib/examples/s6a_bounded_live_policy_probe\.rs:|lib/examples/s6b_adversarial_live_policy_stress\.rs:' \
            s6b-clippy.log; then
            echo "S6 scoped Clippy finding detected"
            exit 1
          fi

      - name: Run deterministic controller contracts
        run: >-
          cargo test -p star --lib --features companion-live-policy-stress --locked
          companion_bounded_live_policy:: -- --test-threads=1

      - name: Re-run frozen S6-A regression probe
        run: |
          cargo run -p star --example s6a_bounded_live_policy_probe \
            --features companion-live-policy-stress --locked \
            | tee s6a-regression-report.json

      - name: Run frozen S6-B adversarial probe
        run: |
          cargo run -p star --example s6b_adversarial_live_policy_stress \
            --features companion-live-policy-stress --locked \
            | tee s6b-adversarial-report.json

      - name: Preserve reports and lint findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s6b-adversarial-live-policy-report
          path: |
            s6a-regression-report.json
            s6b-adversarial-report.json
            s6b-clippy.log
          if-no-files-found: ignore
          retention-days: 30
