name: EI-0E Runner Formatting Repair

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: ei-0e-runner-format-repair
  cancel-in-progress: true

jobs:
  format-runner:
    if: >-
      github.event.pull_request.number == 196 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/ei-0e-terminal-preregistration'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact EI-0E branch
        uses: actions/checkout@v4
        with:
          ref: feat/ei-0e-terminal-preregistration
          fetch-depth: 1
          show-progress: false

      - name: Install Rust formatter
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt

      - name: Apply rustfmt and rebind runner blob
        run: |
          set -euo pipefail
          runner=lib/examples/ei_0f_terminal_experiment.rs
          lock=docs/experiments/EI_0E_FREEZE_LOCK.json
          rustfmt --edition 2021 "$runner"
          runner_blob="$(git hash-object "$runner")"
          RUNNER_BLOB="$runner_blob" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('docs/experiments/EI_0E_FREEZE_LOCK.json')
          value = json.loads(path.read_text(encoding='utf-8'))
          for entry in value['files']:
              if entry['path'] == 'lib/examples/ei_0f_terminal_experiment.rs':
                  entry['git_blob_sha1'] = os.environ['RUNNER_BLOB']
                  break
          else:
              raise SystemExit('runner binding missing from freeze lock')
          path.write_text(
              json.dumps(value, sort_keys=True, separators=(',', ':')) + '\n',
              encoding='utf-8',
          )
          PY
          git diff --check

      - name: Commit mechanical repair
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/examples/ei_0f_terminal_experiment.rs docs/experiments/EI_0E_FREEZE_LOCK.json
          if git diff --cached --quiet; then
            echo 'runner already formatted'
            exit 0
          fi
          git commit -m "style(ei): format dormant EI-0F runner"
          git push origin HEAD:feat/ei-0e-terminal-preregistration
