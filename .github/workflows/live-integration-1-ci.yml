name: Observer Integration CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "src/main.rs"
      - "src/Cargo.toml"
      - "lib/api.rs"
      - "lib/Cargo.toml"
      - "lib/omega_v1f2_shadow.rs"
      - "lib/examples/omega_v1f2_shadow_probe.rs"
      - ".github/workflows/live-integration-1-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  observer-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Normalize formatting for checks
        run: cargo fmt --all

      - name: Compile production binary
        run: cargo check -p star_bin --bin star --features starfire-observer --locked

      - name: Lint production binary
        run: cargo clippy -p star_bin --bin star --features starfire-observer --locked -- -D warnings

      - name: Test F2 observer contracts
        run: cargo test -p star --lib --features omega-v1-f2-shadow --locked omega_v1f2_shadow:: -- --test-threads=1

      - name: Compile F2 isolation probe
        run: cargo check -p star --example omega_v1f2_shadow_probe --features omega-v1-f2-shadow --locked
