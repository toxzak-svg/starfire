name: STLM Independent Language Verifier L1 CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/verifier_ready_realization/**"
      - "lib/language_verification/**"
      - "lib/examples/stlm_l1_independent_language_verifier_probe.rs"
      - "lib/Cargo.toml"
      - "lib/lib.rs"
      - "docs/experiments/STLM_L1_INDEPENDENT_LANGUAGE_VERIFIER.md"
      - "docs/experiments/STLM_L1_IDENTIFIABILITY_ADDENDUM.md"
      - ".github/workflows/stlm-independent-language-verifier-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stlm-l1-independent-language-verifier:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check canonical formatting
        run: |
          rustfmt --edition 2021 --check \
            lib/verifier_ready_realization/mod.rs \
            lib/language_verification/mod.rs \
            lib/examples/stlm_l1_independent_language_verifier_probe.rs

      - name: Compile verifier and frozen probe
        run: |
          cargo check -p star --lib --features independent-language-verifier --locked
          cargo check -p star --example stlm_l1_independent_language_verifier_probe \
            --features independent-language-verifier --locked

      - name: Lint scoped STLM L1 sources
        run: |
          set -o pipefail
          {
            cargo clippy -p star --lib --features independent-language-verifier --locked \
              --message-format=short
            cargo clippy -p star --example stlm_l1_independent_language_verifier_probe \
              --features independent-language-verifier --locked --message-format=short
          } 2>&1 | tee stlm-l1-clippy.log
          if grep -E \
            'lib/verifier_ready_realization/|lib/language_verification/|lib/examples/stlm_l1_independent_language_verifier_probe\.rs:' \
            stlm-l1-clippy.log; then
            echo "STLM L1 scoped Clippy finding detected"
            exit 1
          fi

      - name: Run verifier-ready and inverse-verifier contracts
        run: |
          cargo test -p star --lib --features independent-language-verifier --locked \
            verifier_ready_realization:: -- --test-threads=1
          cargo test -p star --lib --features independent-language-verifier --locked \
            language_verification:: -- --test-threads=1

      - name: Run frozen L0-C regression
        run: |
          set -o pipefail
          cargo run -p star --example stlm_l0c_deterministic_renderer_probe \
            --features deterministic-language-renderer --locked \
            | tee stlm-l0c-regression-report.json

      - name: Run frozen STLM L1 probe
        run: |
          set -o pipefail
          cargo run -p star --example stlm_l1_independent_language_verifier_probe \
            --features independent-language-verifier --locked \
            | tee stlm-l1-independent-language-verifier-report.json

      - name: Preserve reports and lint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stlm-l1-independent-language-verifier-report
          path: |
            stlm-l0c-regression-report.json
            stlm-l1-independent-language-verifier-report.json
            stlm-l1-clippy.log
          if-no-files-found: ignore
          retention-days: 30
