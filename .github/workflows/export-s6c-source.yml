name: Export S6-C Source

on:
  push:
    branches:
      - experiment/s6c-limited-runtime-canary
    paths:
      - ".github/workflows/export-s6c-source.yml"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
      - name: Package repository source
        run: tar --exclude=.git --exclude=target -czf starfire-s6c-source.tar.gz .
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: starfire-s6c-source
          path: starfire-s6c-source.tar.gz
          retention-days: 1
