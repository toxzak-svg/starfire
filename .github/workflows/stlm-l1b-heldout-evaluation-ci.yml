name: STLM L1-B Held-Out Evaluation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/examples/stlm_l1b_heldout_conversation_evaluation.rs"
      - ".github/workflows/stlm-l1b-heldout-evaluation-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stlm-l1b-heldout-evaluation:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Normalize held-out evaluator
        run: |
          rustfmt --edition 2021 lib/examples/stlm_l1b_heldout_conversation_evaluation.rs
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/examples/stlm_l1b_heldout_conversation_evaluation.rs
          git commit -m "style(language): format L1-B held-out evaluator"
          git push
