name: STLM L1-B Held-Out Evaluation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/examples/stlm_l1b_heldout_conversation_evaluation.rs"
      - ".github/workflows/stlm-l1b-heldout-evaluation-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stlm-l1b-heldout-evaluation:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Repair scoped rate helper lint
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("lib/examples/stlm_l1b_heldout_conversation_evaluation.rs")
          text = path.read_text()
          old = """fn rate_bps(numerator: u64, denominator: u64) -> u64 {
              if denominator == 0 {
                  0
              } else {
                  numerator.saturating_mul(10_000) / denominator
              }
          }
          """
          new = """fn rate_bps(numerator: u64, denominator: u64) -> u64 {
              numerator
                  .saturating_mul(10_000)
                  .checked_div(denominator)
                  .unwrap_or(0)
          }
          """
          if text.count(old) != 1:
              raise SystemExit(f"expected one rate helper, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1))
          PY
          rustfmt --edition 2021 lib/examples/stlm_l1b_heldout_conversation_evaluation.rs
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/examples/stlm_l1b_heldout_conversation_evaluation.rs
          git commit -m "chore(language): resolve L1-B rate helper lint"
          git push
