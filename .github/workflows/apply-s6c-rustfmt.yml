name: Apply S6-C rustfmt

on:
  push:
    branches:
      - experiment/s6c-limited-runtime-canary
    paths:
      - "lib/companion_runtime_canary.rs"
      - "lib/examples/s6c_limited_runtime_canary.rs"
      - ".github/workflows/apply-s6c-rustfmt.yml"

permissions:
  contents: write

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: experiment/s6c-limited-runtime-canary

      - name: Install Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format scoped S6-C sources
        run: |
          rustfmt --edition 2021 \
            lib/companion_runtime_canary.rs \
            lib/examples/s6c_limited_runtime_canary.rs

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/companion_runtime_canary.rs lib/examples/s6c_limited_runtime_canary.rs
          git commit -m "style(companion): format S6-C sources"
          git push origin HEAD:experiment/s6c-limited-runtime-canary
