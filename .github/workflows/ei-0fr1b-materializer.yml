name: EI-0F-R1B Package Materializer

on:
  push:
    branches:
      - feat/ei-0fr1b-terminal-freeze
    paths:
      - .ei0fr1b-materialize

permissions:
  contents: write

concurrency:
  group: ei-0fr1b-package-materializer
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ei-0fr1b-terminal-freeze
          fetch-depth: 1
          show-progress: false

      - name: Generate exact frozen package
        run: python3 scripts/ei0fr1b_materialize.py

      - name: Verify generated package paths
        run: |
          set -euo pipefail
          for path in \
            docs/experiments/EI_0F_R1_FREEZE_LOCK.json \
            docs/experiments/EI_0F_R1_TERMINAL_PREREGISTRATION.json \
            docs/experiments/EI_0F_R1_TERMINAL_PREREGISTRATION.md \
            lib/examples/ei_0f_r1_terminal_experiment.rs; do
            test -f "$path"
          done
          python3 scripts/ei0fr1_preregistration.py self-test

      - name: Remove temporary machinery and commit
        run: |
          set -euo pipefail
          rm -f \
            .ei0fr1b-materialize \
            .github/workflows/ei-0fr1b-materializer.yml \
            scripts/ei0fr1b_materialize.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "experiment(ei): materialize frozen EI-0F-R1B package"
          git push origin HEAD:feat/ei-0fr1b-terminal-freeze
