name: Companion Bounded Live Policy S6-A CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/companion_bounded_live_policy.rs"
      - "lib/examples/s6a_bounded_live_policy_probe.rs"
      - "lib/companion_policy_evaluation.rs"
      - "lib/companion_interaction_policy.rs"
      - "lib/language_model/intent_reranker.rs"
      - "lib/runtime/response_intent.rs"
      - "lib/lib.rs"
      - "lib/Cargo.toml"
      - "docs/INGEXUITY_STARFIRE_INTEGRATION.md"
      - "docs/experiments/S6A_BOUNDED_LIVE_POLICY.md"
      - "docs/experiments/S6A_BOUNDED_LIVE_POLICY_RESULT.md"
      - ".github/workflows/companion-bounded-live-policy-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  s6a-bounded-live-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Harden duplicate-turn audit contract
        run: |
          python - <<'PY'
          from pathlib import Path

          module = Path("lib/companion_bounded_live_policy.rs")
          text = module.read_text()
          if "InvalidDuplicateFallback" not in text:
              old_event = "\n".join([
                  "            LivePolicyEvent::TurnPlanned {",
                  "                turn_digest,",
                  "                disposition,",
                  "                remaining_turns_after,",
                  "                ..",
                  "            } => {",
                  "                if !self.seen_turns.insert(*turn_digest) {",
                  "                    return Err(LivePolicyError::DuplicateAuditTurn(*turn_digest));",
                  "                }",
              ])
              new_event = "\n".join([
                  "            LivePolicyEvent::TurnPlanned {",
                  "                turn_digest,",
                  "                disposition,",
                  "                fallback_reason,",
                  "                remaining_turns_after,",
                  "                ..",
                  "            } => {",
                  "                let duplicate_fallback = *disposition == LivePlanDisposition::NeutralFallback",
                  "                    && *fallback_reason == Some(NeutralFallbackReason::DuplicateTurn);",
                  "                if duplicate_fallback {",
                  "                    if !self.seen_turns.contains(turn_digest) {",
                  "                        return Err(LivePolicyError::InvalidDuplicateFallback(*turn_digest));",
                  "                    }",
                  "                } else if !self.seen_turns.insert(*turn_digest) {",
                  "                    return Err(LivePolicyError::DuplicateAuditTurn(*turn_digest));",
                  "                }",
              ])
              assert old_event in text, "duplicate-turn event pattern not found"
              text = text.replace(old_event, new_event, 1)

              old_error = "\n".join([
                  "    #[error(\"audit contains duplicate turn digest {0}\\")]".replace("\\\"", "\""),
                  "    DuplicateAuditTurn(u64),",
                  "    #[error(\"audit budget does not match deterministic transition\")]",
              ])
              new_error = "\n".join([
                  "    #[error(\"audit contains duplicate turn digest {0} without duplicate fallback\")]",
                  "    DuplicateAuditTurn(u64),",
                  "    #[error(\"duplicate fallback references unseen turn digest {0}\")]",
                  "    InvalidDuplicateFallback(u64),",
                  "    #[error(\"audit budget does not match deterministic transition\")]",
              ])
              assert old_error in text, "duplicate-turn error pattern not found"
              text = text.replace(old_error, new_error, 1)

              marker = "    #[test]\n    fn replay_is_exact() {"
              test = "\n".join([
                  "    #[test]",
                  "    fn duplicate_turn_is_audited_neutral_fallback_without_consuming_budget() {",
                  "        let config = LivePolicyControllerConfig {",
                  "            allow_simulated_activation: true,",
                  "            ..LivePolicyControllerConfig::default()",
                  "        };",
                  "        let gate = ValidatedPromotionGate::validate(",
                  "            &passing_report(),",
                  "            EvaluationEvidenceClass::FrozenSimulation,",
                  "            1,",
                  "        )",
                  "        .unwrap();",
                  "        let mut controller = BoundedLivePolicyController::new(config).unwrap();",
                  "        controller",
                  "            .activate(0, &gate, &proposal(), activation())",
                  "            .unwrap();",
                  "        let (response, rerank) = baseline();",
                  "        controller",
                  "            .plan_response(controller.version, context(1, false), response, rerank)",
                  "            .unwrap();",
                  "        let (duplicate_response, duplicate_rerank) = baseline();",
                  "        let duplicate = controller",
                  "            .plan_response(",
                  "                controller.version,",
                  "                context(1, false),",
                  "                duplicate_response,",
                  "                duplicate_rerank,",
                  "            )",
                  "            .unwrap();",
                  "        assert_eq!(duplicate.disposition, LivePlanDisposition::NeutralFallback);",
                  "        assert_eq!(",
                  "            duplicate.fallback_reason,",
                  "            Some(NeutralFallbackReason::DuplicateTurn)",
                  "        );",
                  "        assert_eq!(duplicate.remaining_turns, 1);",
                  "        let replayed = BoundedLivePolicyController::replay(config, controller.events()).unwrap();",
                  "        assert_eq!(replayed, controller);",
                  "    }",
                  "",
              ])
              assert marker in text, "replay test marker not found"
              text = text.replace(marker, test + marker, 1)
              module.write_text(text)

          probe = Path("lib/examples/s6a_bounded_live_policy_probe.rs")
          text = probe.read_text()
          if "duplicate_turn_used_neutral_fallback" not in text:
              old_fields = "\n".join([
                  "    sensitive_context_used_exact_neutral_fallback: bool,",
                  "    disallowed_intent_used_neutral_fallback: bool,",
              ])
              new_fields = "\n".join([
                  "    sensitive_context_used_exact_neutral_fallback: bool,",
                  "    duplicate_turn_used_neutral_fallback: bool,",
                  "    disallowed_intent_used_neutral_fallback: bool,",
              ])
              assert old_fields in text, "probe report fields not found"
              text = text.replace(old_fields, new_fields, 1)

              marker = "\n".join([
                  "    let reranked_output_respected_brief_budget = reranked.chars().count() <= 161;",
                  "",
                  "    let (sensitive_response, sensitive_config) = baseline(ResponseIntent::Recall);",
              ])
              insertion = "\n".join([
                  "    let reranked_output_respected_brief_budget = reranked.chars().count() <= 161;",
                  "",
                  "    let (duplicate_response, duplicate_config) = baseline(ResponseIntent::Recall);",
                  "    let duplicate = controller",
                  "        .plan_response(",
                  "            controller.version,",
                  "            context(1, false),",
                  "            duplicate_response,",
                  "            duplicate_config,",
                  "        )",
                  "        .unwrap();",
                  "    let duplicate_turn_used_neutral_fallback = duplicate.disposition",
                  "        == LivePlanDisposition::NeutralFallback",
                  "        && duplicate.fallback_reason == Some(NeutralFallbackReason::DuplicateTurn)",
                  "        && duplicate.remaining_turns == 1;",
                  "",
                  "    let (sensitive_response, sensitive_config) = baseline(ResponseIntent::Recall);",
              ])
              assert marker in text, "probe duplicate insertion marker not found"
              text = text.replace(marker, insertion, 1)

              old_gate = "\n".join([
                  "        && sensitive_context_used_exact_neutral_fallback",
                  "        && disallowed_intent_used_neutral_fallback",
              ])
              new_gate = "\n".join([
                  "        && sensitive_context_used_exact_neutral_fallback",
                  "        && duplicate_turn_used_neutral_fallback",
                  "        && disallowed_intent_used_neutral_fallback",
              ])
              assert old_gate in text, "probe gate fields not found"
              text = text.replace(old_gate, new_gate, 1)

              old_result = "\n".join([
                  "        sensitive_context_used_exact_neutral_fallback,",
                  "        disallowed_intent_used_neutral_fallback,",
              ])
              new_result = "\n".join([
                  "        sensitive_context_used_exact_neutral_fallback,",
                  "        duplicate_turn_used_neutral_fallback,",
                  "        disallowed_intent_used_neutral_fallback,",
              ])
              assert old_result in text, "probe result fields not found"
              text = text.replace(old_result, new_result, 1)
              probe.write_text(text)
          PY

      - name: Format S6-A sources canonically
        run: |
          rustfmt --edition 2021 \
            lib/companion_bounded_live_policy.rs \
            lib/examples/s6a_bounded_live_policy_probe.rs

      - name: Compile S6-A controller and probe
        run: |
          cargo check -p star --lib --features companion-bounded-live-policy --locked
          cargo check -p star --example s6a_bounded_live_policy_probe \
            --features companion-bounded-live-policy --locked

      - name: Lint S6-A sources without inheriting legacy warnings
        run: |
          set -o pipefail
          {
            cargo clippy -p star --lib --features companion-bounded-live-policy --locked \
              --message-format=short
            cargo clippy -p star --example s6a_bounded_live_policy_probe \
              --features companion-bounded-live-policy --locked --message-format=short
          } 2>&1 | tee s6a-clippy.log
          if grep -E \
            'lib/companion_bounded_live_policy\.rs:|lib/examples/s6a_bounded_live_policy_probe\.rs:' \
            s6a-clippy.log; then
            echo "S6-A scoped Clippy finding detected"
            exit 1
          fi

      - name: Test S6-A contracts deterministically
        run: >-
          cargo test -p star --lib --features companion-bounded-live-policy --locked
          companion_bounded_live_policy:: -- --test-threads=1

      - name: Run frozen S6-A bounded-live-policy probe
        run: |
          set -o pipefail
          cargo run -p star --example s6a_bounded_live_policy_probe \
            --features companion-bounded-live-policy --locked \
            | tee s6a-bounded-live-policy-report.json

      - name: Commit verified canonical sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/companion_bounded_live_policy.rs \
            lib/examples/s6a_bounded_live_policy_probe.rs
          if ! git diff --cached --quiet; then
            git commit -m "fix(companion): harden S6-A duplicate-turn replay"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Preserve S6-A report, lint, and formatted sources
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s6a-bounded-live-policy-report
          path: |
            s6a-bounded-live-policy-report.json
            s6a-clippy.log
            lib/companion_bounded_live_policy.rs
            lib/examples/s6a_bounded_live_policy_probe.rs
          if-no-files-found: ignore
          retention-days: 30
