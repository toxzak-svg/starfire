name: STLM L1-D3A failure attribution

on:
  pull_request:
    paths:
      - "tools/stlm_l1d/run_failure_attribution.py"
      - "tools/stlm_l1d/test_failure_attribution.py"
      - "tools/stlm_l1d/l1d2_core.py"
      - "tools/stlm_l1d/l1d2_rankers.py"
      - "tools/stlm_l1d/materialize_valid_surface_corpora.py"
      - "tools/stlm_l1d/materialize_fast_ablation_models.py"
      - "tools/stlm_l1d/data/bootstrap_pairs.jsonl"
      - "tools/stlm_l1d/fixtures/valid_surface_manifest.json"
      - "tools/stlm_l1d/fixtures/fast_ablation_*"
      - "docs/experiments/STLM_L1D3_RECOVERY_PREREGISTRATION.md"
      - ".github/workflows/stlm-l1d3a-failure-attribution.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  failure-attribution:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate diagnostic tools
        run: |
          python -m py_compile tools/stlm_l1d/run_failure_attribution.py
          python -m py_compile tools/stlm_l1d/test_failure_attribution.py

      - name: Run diagnostic unit tests
        working-directory: tools/stlm_l1d
        run: python -m unittest -v test_failure_attribution.py

      - name: Materialize frozen valid-surface corpora
        run: |
          mkdir -p artifacts
          python tools/stlm_l1d/materialize_valid_surface_corpora.py \
            2>&1 | tee artifacts/stlm_l1d3a_corpus_materialization.log

      - name: Materialize frozen phrase-critic checkpoint
        run: |
          mkdir -p artifacts/models
          python tools/stlm_l1d/materialize_fast_ablation_models.py \
            --manifest tools/stlm_l1d/fixtures/fast_ablation_manifest.json \
            --output-dir artifacts/models \
            2>&1 | tee artifacts/stlm_l1d3a_model_materialization.log
          test -s artifacts/models/fast_ablation_full_model.json

      - name: Run five-seed failure attribution
        id: diagnostic
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python tools/stlm_l1d/run_failure_attribution.py \
            --model artifacts/models/fast_ablation_full_model.json \
            --surface-corpus tools/stlm_l1d/data/valid_surface_tournaments.jsonl \
            --bootstrap-pairs tools/stlm_l1d/data/bootstrap_pairs.jsonl \
            --output-json artifacts/stlm_l1d3a_report.json \
            --output-md artifacts/stlm_l1d3a_report.md \
            --seeds 1729,2718,3141,5772,8119 \
            --max-runtime-seconds 90 \
            2>&1 | tee artifacts/stlm_l1d3a_diagnostic.log

      - name: Verify frozen diagnostic contract
        if: steps.diagnostic.outcome == 'success'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/stlm_l1d3a_report.json").read_text())
          assert report["schema_version"] == 1
          assert report["experiment"] == "STLM L1-D3A"
          assert report["structural_gate_passed"] is True
          assert report["deterministic_full_report_replay"] is True
          assert report["within_runtime_budget"] is True
          assert report["seeds"] == [1729, 2718, 3141, 5772, 8119]
          assert report["observation_scope"]["test_observations"] == 60
          assert 12 <= report["observation_scope"]["unique_tournaments"] <= 36
          assert set(report["category_breakdown"]) == {
              "technical",
              "emotional",
              "uncertainty",
              "continuity",
              "disagreement",
              "adversarial",
          }
          assert len(report["per_tournament_score_traces"]) == 60
          assert report["diagnosis"]["primary_failure"] == "training_target_mismatch"
          assert report["diagnosis"]["longer_training_on_bootstrap_pairs_recommended"] is False
          assert report["diagnosis"]["wider_residual_authority_recommended"] is False
          assert report["bootstrap_target_audit"]["pairs"] == 16
          assert report["bootstrap_target_audit"]["semantic_or_authority_risk_pairs"] > 0
          assert report["bootstrap_target_audit"]["target_contract_matches_valid_surface_tournaments"] is False
          assert report["rule_score_independence_audit"]["independence_verified"] is False
          assert report["promotion_contract"]["frozen"] is True
          assert len(report["promotion_contract"]["required_gates"]) == 13
          assert report["promotion_contract"]["automatic_promotion"] is False
          assert report["authority"] == {
              "critic_promotion_allowed": False,
              "runtime_chat_influence": False,
              "http_response_influence": False,
              "training_performed": False,
              "model_weights_modified": False,
              "l1d2_result_preserved": True,
          }
          required_shortcuts = {"context", "punctuation", "whitespace", "unicode", "terminal"}
          assert set(report["shortcut_diagnostics"]["selection_stability_bps"]) == required_shortcuts
          assert set(report["shortcut_diagnostics"]["critic_score_correlations"]) == {
              "byte_length",
              "character_length",
              "word_count",
              "punctuation_count",
              "rule_score",
          }
          assert Path("artifacts/stlm_l1d3a_report.md").read_text().startswith(
              "# STLM L1-D3A Failure Attribution"
          )
          PY

      - name: Upload attribution report and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stlm-l1d3a-failure-attribution
          path: artifacts
          if-no-files-found: error

      - name: Enforce diagnostic success
        if: steps.diagnostic.outcome != 'success'
        run: exit 1
