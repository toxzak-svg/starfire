name: EI-0F-R2 Schema-Bound Terminal Freeze CI

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/experiments/EI_0F_R2_TERMINAL_PREREGISTRATION.json"
      - "docs/experiments/EI_0F_R2_TERMINAL_PREREGISTRATION.md"
      - "docs/experiments/EI_0F_R2_FREEZE_LOCK.json"
      - "docs/experiments/EI_0F_R2_TERMINAL_REPORT.schema.json"
      - "lib/examples/ei_0f_r2_terminal_experiment.rs"
      - "scripts/ei0fr2_preregistration.py"
      - ".github/workflows/ei-0fr2-terminal-freeze-ci.yml"
  push:
    branches: [main]
    paths:
      - "docs/experiments/EI_0F_R2_TERMINAL_PREREGISTRATION.json"
      - "docs/experiments/EI_0F_R2_TERMINAL_PREREGISTRATION.md"
      - "docs/experiments/EI_0F_R2_FREEZE_LOCK.json"
      - "docs/experiments/EI_0F_R2_TERMINAL_REPORT.schema.json"
      - "lib/examples/ei_0f_r2_terminal_experiment.rs"
      - "scripts/ei0fr2_preregistration.py"
      - ".github/workflows/ei-0fr2-terminal-freeze-ci.yml"

permissions:
  contents: read

concurrency:
  group: ei-0fr2-terminal-freeze-${{ github.ref }}
  cancel-in-progress: true

jobs:
  freeze:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      - name: Verify canonical V2 package twice
        run: |
          set -euo pipefail
          mkdir -p target/ei-0fr2-freeze
          python3 scripts/ei0fr2_preregistration.py verify > target/ei-0fr2-freeze/verify-a.json
          python3 scripts/ei0fr2_preregistration.py verify > target/ei-0fr2-freeze/verify-b.json
          cmp target/ei-0fr2-freeze/verify-a.json target/ei-0fr2-freeze/verify-b.json

      - name: Verify classifier and schema vectors twice
        run: |
          set -euo pipefail
          python3 scripts/ei0fr2_preregistration.py self-test > target/ei-0fr2-freeze/self-test-a.json
          python3 scripts/ei0fr2_preregistration.py self-test > target/ei-0fr2-freeze/self-test-b.json
          cmp target/ei-0fr2-freeze/self-test-a.json target/ei-0fr2-freeze/self-test-b.json

      - name: Re-run five-arm digest preflight twice
        run: |
          set -euo pipefail
          cargo run --quiet -p star --example ei_0f_r1_digest_remediation_probe \
            --features emerging-intelligence-environment --locked \
            > target/ei-0fr2-freeze/preflight-a.json
          cargo run --quiet -p star --example ei_0f_r1_digest_remediation_probe \
            --features emerging-intelligence-environment --locked \
            > target/ei-0fr2-freeze/preflight-b.json
          cmp target/ei-0fr2-freeze/preflight-a.json target/ei-0fr2-freeze/preflight-b.json
          grep -q '"classification": "PASS"' target/ei-0fr2-freeze/preflight-a.json

      - name: Check V2 runner formatting
        run: rustfmt --edition 2021 --check lib/examples/ei_0f_r2_terminal_experiment.rs

      - name: Compile V2 runner without executing it
        run: >-
          cargo check --quiet -p star
          --example ei_0f_r2_terminal_experiment
          --features emerging-intelligence-updates
          --locked

      - name: Capture original and V2 Clippy diagnostics
        run: |
          set -euo pipefail
          cargo clippy --quiet -p star \
            --example ei_0f_terminal_experiment \
            --features emerging-intelligence-updates \
            --locked --message-format=json \
            > target/ei-0fr2-freeze/clippy-original.jsonl
          cargo clippy --quiet -p star \
            --example ei_0f_r2_terminal_experiment \
            --features emerging-intelligence-updates \
            --locked --message-format=json \
            > target/ei-0fr2-freeze/clippy-v2.jsonl

      - name: Deny newly introduced V2 warnings
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import sys

          def warnings(path, target):
              found = set()
              for raw in pathlib.Path(path).read_text(encoding="utf-8").splitlines():
                  try:
                      event = json.loads(raw)
                  except json.JSONDecodeError:
                      continue
                  if event.get("reason") != "compiler-message":
                      continue
                  message = event.get("message", {})
                  if message.get("level") != "warning":
                      continue
                  files = {
                      span.get("file_name")
                      for span in message.get("spans", [])
                      if span.get("file_name")
                  }
                  if target not in files:
                      continue
                  code = (message.get("code") or {}).get("code") or "uncoded"
                  found.add((code, message.get("message") or ""))
              return found

          original = warnings(
              "target/ei-0fr2-freeze/clippy-original.jsonl",
              "lib/examples/ei_0f_terminal_experiment.rs",
          )
          v2 = warnings(
              "target/ei-0fr2-freeze/clippy-v2.jsonl",
              "lib/examples/ei_0f_r2_terminal_experiment.rs",
          )
          introduced = sorted(v2 - original)
          if introduced:
              for code, message in introduced:
                  print(f"{code}: {message}", file=sys.stderr)
              raise SystemExit(1)
          print(json.dumps({
              "inherited_warning_count": len(v2),
              "introduced_warning_count": 0,
          }, sort_keys=True))
          PY

      - name: Enforce compile-only closed authority
        run: |
          set -euo pipefail
          runner=lib/examples/ei_0f_r2_terminal_experiment.rs
          for token in 'Runtime::chat' rusqlite reqwest 'std::net' 'tokio::net' Telegram ontology tool_selection; do
            if grep -Fq "$token" "$runner"; then
              echo "forbidden authority token: $token" >&2
              exit 1
            fi
          done
          forbidden='cargo run -p star --example '
          forbidden+='ei_0f_r2_terminal_experiment'
          if grep -Fq "$forbidden" .github/workflows/ei-0fr2-terminal-freeze-ci.yml; then
            echo 'freeze gate must not execute the V2 terminal experiment' >&2
            exit 1
          fi

      - name: Preserve V2 freeze evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ei-0fr2-terminal-freeze-evidence
          path: target/ei-0fr2-freeze
          if-no-files-found: warn
          retention-days: 30
