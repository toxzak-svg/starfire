name: EI-0E Dormant Runner Rustfmt

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: ei-0e-runner-rustfmt
  cancel-in-progress: false

jobs:
  format:
    if: >-
      github.event.pull_request.number == 196 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/ei-0e-terminal-preregistration'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ei-0e-terminal-preregistration
          fetch-depth: 0
          show-progress: false

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt

      - name: Apply pinned formatting to dormant runner only
        run: rustfmt --edition 2021 lib/examples/ei_0f_terminal_experiment.rs

      - name: Verify exact write scope
        run: |
          set -euo pipefail
          changed="$(git status --short | awk '{print $2}')"
          unexpected="$(printf '%s\n' "$changed" | grep -v '^lib/examples/ei_0f_terminal_experiment.rs$' || true)"
          if [ -n "$unexpected" ]; then
            printf 'Unexpected formatter paths:\n%s\n' "$unexpected" >&2
            exit 1
          fi

      - name: Commit exact Rustfmt output
        run: |
          set -euo pipefail
          if git diff --quiet -- lib/examples/ei_0f_terminal_experiment.rs; then
            echo 'Dormant runner already formatted.'
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/examples/ei_0f_terminal_experiment.rs
          git commit -m "style(ei): format dormant EI-0F runner"
          git push origin HEAD:feat/ei-0e-terminal-preregistration
