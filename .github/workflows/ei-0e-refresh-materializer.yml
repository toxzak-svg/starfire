name: EI-0E Source Identity Rebind

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: ei-0e-source-rebind
  cancel-in-progress: true

jobs:
  rebind:
    if: >-
      github.event.pull_request.number == 196 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/ei-0e-terminal-preregistration'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact EI-0E branch
        uses: actions/checkout@v4
        with:
          ref: feat/ei-0e-terminal-preregistration
          fetch-depth: 1
          show-progress: false

      - name: Fetch current main source
        run: git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main

      - name: Rebind the complete frozen package
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import re
          import subprocess
          from pathlib import Path

          root = Path('.')
          manifest_path = root / 'docs/experiments/EI_0E_TERMINAL_PREREGISTRATION.json'
          markdown_path = root / 'docs/experiments/EI_0E_TERMINAL_PREREGISTRATION.md'
          lock_path = root / 'docs/experiments/EI_0E_FREEZE_LOCK.json'
          script_path = root / 'scripts/ei0e_preregistration.py'
          runner_path = root / 'lib/examples/ei_0f_terminal_experiment.rs'

          def canonical(value):
              return (json.dumps(value, sort_keys=True, separators=(',', ':'), ensure_ascii=False) + '\n').encode('utf-8')

          def blob_sha(data):
              header = f'blob {len(data)}\0'.encode('ascii')
              return hashlib.sha1(header + data, usedforsecurity=False).hexdigest()

          def origin_main_bytes(path):
              return subprocess.check_output(['git', 'show', f'origin/main:{path}'])

          main_commit = subprocess.check_output(
              ['git', 'rev-parse', 'origin/main'], text=True
          ).strip()
          if not re.fullmatch(r'[0-9a-f]{40}', main_commit):
              raise SystemExit(f'invalid main commit: {main_commit}')

          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          manifest['freeze_base_commit'] = main_commit
          for entry in manifest['source_files']:
              entry['git_blob_sha1'] = blob_sha(origin_main_bytes(entry['path']))
          manifest_bytes = canonical(manifest)
          manifest_path.write_bytes(manifest_bytes)
          manifest_digest = hashlib.sha256(manifest_bytes).hexdigest()

          markdown = markdown_path.read_text(encoding='utf-8')
          markdown, freeze_count = re.subn(
              r'> \*\*Freeze base:\*\* `[0-9a-f]{40}`  ',
              f'> **Freeze base:** `{main_commit}`  ',
              markdown,
              count=1,
          )
          markdown, digest_count = re.subn(
              r'> \*\*Canonical manifest SHA-256:\*\* `[0-9a-f]{64}`',
              f'> **Canonical manifest SHA-256:** `{manifest_digest}`',
              markdown,
              count=1,
          )
          if freeze_count != 1 or digest_count != 1:
              raise SystemExit('failed to update preregistration Markdown bindings')
          markdown_path.write_text(markdown, encoding='utf-8')

          script = script_path.read_text(encoding='utf-8')
          script, script_count = re.subn(
              r'(manifest\.get\("freeze_base_commit"\)\s*\n\s*==\s*")[0-9a-f]{40}(")',
              lambda match: match.group(1) + main_commit + match.group(2),
              script,
              count=1,
          )
          if script_count != 1:
              raise SystemExit('failed to update verifier freeze-base binding')
          script_path.write_text(script, encoding='utf-8')

          runner = runner_path.read_text(encoding='utf-8')
          runner, runner_count = re.subn(
              r'(const PREREGISTRATION_DIGEST: &str =\s*")[0-9a-f]{64}(";)',
              lambda match: match.group(1) + manifest_digest + match.group(2),
              runner,
              count=1,
          )
          if runner_count != 1:
              raise SystemExit('failed to update runner manifest binding')
          runner_path.write_text(runner, encoding='utf-8')

          lock = json.loads(lock_path.read_text(encoding='utf-8'))
          lock['manifest_sha256'] = manifest_digest
          for entry in lock['files']:
              path = root / entry['path']
              entry['git_blob_sha1'] = blob_sha(path.read_bytes())
          lock_path.write_bytes(canonical(lock))

          print(json.dumps({
              'freeze_base_commit': main_commit,
              'manifest_sha256': manifest_digest,
              'source_files': len(manifest['source_files']),
              'lock_files': len(lock['files']),
          }, sort_keys=True))
          PY

      - name: Remove temporary rebind machinery
        run: rm .github/workflows/ei-0e-refresh-materializer.yml

      - name: Verify exact rebind scope
        run: |
          set -euo pipefail
          allowed='^( M|M | D|D ) (docs/experiments/EI_0E_TERMINAL_PREREGISTRATION.json|docs/experiments/EI_0E_TERMINAL_PREREGISTRATION.md|docs/experiments/EI_0E_FREEZE_LOCK.json|scripts/ei0e_preregistration.py|lib/examples/ei_0f_terminal_experiment.rs|.github/workflows/ei-0e-refresh-materializer.yml)$'
          unexpected="$(git status --short | grep -Ev "$allowed" || true)"
          if [ -n "$unexpected" ]; then
            printf 'Unexpected EI-0E rebind paths:\n%s\n' "$unexpected" >&2
            exit 1
          fi

      - name: Commit current-main freeze
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A \
            .github/workflows/ei-0e-refresh-materializer.yml \
            docs/experiments/EI_0E_TERMINAL_PREREGISTRATION.json \
            docs/experiments/EI_0E_TERMINAL_PREREGISTRATION.md \
            docs/experiments/EI_0E_FREEZE_LOCK.json \
            scripts/ei0e_preregistration.py \
            lib/examples/ei_0f_terminal_experiment.rs
          git commit -m "docs(ei): bind EI-0E freeze to current main"
          git push origin HEAD:feat/ei-0e-terminal-preregistration
