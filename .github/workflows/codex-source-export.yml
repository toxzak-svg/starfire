name: Codex source export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Package tracked source
        run: git archive --format=tar.gz --output=starfire-source.tar.gz HEAD

      - name: Upload source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: codex-source-export
          path: starfire-source.tar.gz
          retention-days: 1
