name: EI-0B Deterministic Environment CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/emerging_intelligence/environment/**"
      - "lib/examples/ei_0b_deterministic_environment_probe.rs"
      - "lib/lib.rs"
      - "lib/Cargo.toml"
      - "docs/experiments/EI_0B_DETERMINISTIC_ENVIRONMENT.md"
      - ".github/workflows/ei-0b-environment-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  environment:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check scoped Rustfmt
        run: |
          rustfmt --edition 2021 --check \
            lib/emerging_intelligence/environment/mod.rs \
            lib/emerging_intelligence/environment/manifest.rs \
            lib/emerging_intelligence/environment/evaluation.rs \
            lib/emerging_intelligence/environment/fixture/mod.rs \
            lib/emerging_intelligence/environment/fixture/generator.rs \
            lib/emerging_intelligence/environment/tests.rs \
            lib/examples/ei_0b_deterministic_environment_probe.rs

      - name: Compile feature-gated environment and probe
        run: |
          cargo check -p star --lib --features emerging-intelligence-environment --locked
          cargo check -p star --example ei_0b_deterministic_environment_probe \
            --features emerging-intelligence-environment --locked

      - name: Lint EI-0B changed surfaces
        run: |
          set -euo pipefail
          cargo clippy -p star --lib --features emerging-intelligence-environment --locked \
            --message-format=json > ei-0b-clippy-lib.json
          cargo clippy -p star --example ei_0b_deterministic_environment_probe \
            --features emerging-intelligence-environment --locked \
            --message-format=json > ei-0b-clippy-example.json
          python3 - <<'PY'
          import json
          import pathlib
          import sys

          logs = [
              pathlib.Path("ei-0b-clippy-lib.json"),
              pathlib.Path("ei-0b-clippy-example.json"),
          ]

          def is_scoped(filename: str) -> bool:
              normalized = filename.replace("\\", "/").lstrip("./")
              return (
                  normalized == "lib.rs"
                  or normalized.endswith("/lib.rs")
                  or normalized == "examples/ei_0b_deterministic_environment_probe.rs"
                  or normalized.endswith("/examples/ei_0b_deterministic_environment_probe.rs")
                  or normalized.startswith("emerging_intelligence/environment/")
                  or "/emerging_intelligence/environment/" in f"/{normalized}"
              )

          findings = []
          seen = set()
          for log in logs:
              for raw in log.read_text(encoding="utf-8").splitlines():
                  try:
                      event = json.loads(raw)
                  except json.JSONDecodeError:
                      continue
                  if event.get("reason") != "compiler-message":
                      continue
                  message = event.get("message", {})
                  if message.get("level") != "warning":
                      continue
                  primary = [
                      span for span in message.get("spans", [])
                      if span.get("is_primary") and is_scoped(span.get("file_name", ""))
                  ]
                  if not primary:
                      continue
                  rendered = message.get("rendered") or message.get("message", "Clippy warning")
                  if rendered not in seen:
                      seen.add(rendered)
                      findings.append(rendered.rstrip())

          report = pathlib.Path("ei-0b-clippy-scoped.txt")
          if findings:
              report.write_text("\n\n".join(findings) + "\n", encoding="utf-8")
              print(report.read_text(encoding="utf-8"), file=sys.stderr)
              raise SystemExit(f"{len(findings)} Clippy warning(s) found in EI-0B changed surfaces")

          report.write_text("EI-0B changed surfaces contain no Clippy warnings.\n", encoding="utf-8")
          print(report.read_text(encoding="utf-8"), end="")
          PY

      - name: Test deterministic environment contracts
        run: >-
          cargo test -p star --lib --features emerging-intelligence-environment --locked
          emerging_intelligence_environment:: -- --test-threads=1

      - name: Run exact-replay probe twice
        run: |
          set -euo pipefail
          cargo run -p star --example ei_0b_deterministic_environment_probe \
            --features emerging-intelligence-environment --locked \
            > ei-0b-environment-report.json
          cargo run -p star --example ei_0b_deterministic_environment_probe \
            --features emerging-intelligence-environment --locked \
            > ei-0b-environment-report-replay.json
          cmp ei-0b-environment-report.json ei-0b-environment-report-replay.json
          grep -q '"classification": "pass"' ei-0b-environment-report.json
          grep -q '"claim": "ei-0b-experiment-infrastructure-only"' ei-0b-environment-report.json
          grep -q '"exact_replay": true' ei-0b-environment-report.json
          grep -q '"renamed_surface_changed": true' ei-0b-environment-report.json
          grep -q '"structural_composition_changed": true' ei-0b-environment-report.json
          grep -q '"runtime_wiring": false' ei-0b-environment-report.json
          grep -q '"learning_application_authority": false' ei-0b-environment-report.json

      - name: Preserve deterministic environment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ei-0b-environment-report
          path: |
            ei-0b-environment-report.json
            ei-0b-environment-report-replay.json
            ei-0b-clippy-scoped.txt
          if-no-files-found: ignore
          retention-days: 30
