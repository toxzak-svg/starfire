name: EI-0C Target Rustfmt

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: ei-0c-target-rustfmt
  cancel-in-progress: false

jobs:
  format:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/ei-0c-append-only-ledger'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out exact EI-0C head branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install pinned Rustfmt
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt

      - name: Apply exact scoped formatting
        run: |
          rustfmt --edition 2021 \
            lib/lib.rs \
            lib/emerging_intelligence/ledger.rs \
            lib/examples/ei_0c_append_only_ledger_probe.rs

      - name: Verify write scope
        run: |
          set -euo pipefail
          unexpected="$(git diff --name-only | grep -Ev '^(lib/lib.rs|lib/emerging_intelligence/ledger.rs|lib/examples/ei_0c_append_only_ledger_probe.rs)$' || true)"
          if [ -n "$unexpected" ]; then
            printf 'Unexpected formatted paths:\n%s\n' "$unexpected" >&2
            exit 1
          fi

      - name: Commit exact formatter output
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "EI-0C files already match pinned Rustfmt."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/lib.rs \
            lib/emerging_intelligence/ledger.rs \
            lib/examples/ei_0c_append_only_ledger_probe.rs
          git commit -m "style(ei): apply pinned EI-0C Rustfmt"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
