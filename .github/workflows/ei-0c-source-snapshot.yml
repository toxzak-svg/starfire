name: EI-0C Source Snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4

      - name: Package exact source tree
        run: |
          tar \
            --exclude=.git \
            --exclude=target \
            -czf ei-0c-source-snapshot.tar.gz .

      - name: Preserve exact source tree
        uses: actions/upload-artifact@v4
        with:
          name: ei-0c-source-snapshot
          path: ei-0c-source-snapshot.tar.gz
          retention-days: 1
