name: EI-0F Frozen Failure Replay CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "docs/experiments/EI_0F_TERMINAL_*"
      - "scripts/ei0e_preregistration.py"
      - ".github/workflows/ei-0f-terminal-execution.yml"
  push:
    branches:
      - main
    paths:
      - "docs/experiments/EI_0F_TERMINAL_*"
      - "scripts/ei0e_preregistration.py"
      - ".github/workflows/ei-0f-terminal-execution.yml"

permissions:
  contents: read

jobs:
  verify-frozen-failure:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify frozen EI-0E identity
        run: python3 scripts/ei0e_preregistration.py verify

      - name: Replay frozen FAIL classifier
        run: |
          set +e
          python3 scripts/ei0e_preregistration.py classify \
            docs/experiments/EI_0F_TERMINAL_REPORT.json \
            > /tmp/ei-0f-classification.json
          status=$?
          set -e
          test "$status" -eq 1
          cmp /tmp/ei-0f-classification.json \
            docs/experiments/EI_0F_TERMINAL_CLASSIFICATION.json

      - name: Verify sealed evidence digests and boundaries
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path('.')
          report_path = root / 'docs/experiments/EI_0F_TERMINAL_REPORT.json'
          classification_path = root / 'docs/experiments/EI_0F_TERMINAL_CLASSIFICATION.json'
          log_path = root / 'docs/experiments/EI_0F_TERMINAL_EXECUTION_FAILURE.log'
          evidence = json.loads(
              (root / 'docs/experiments/EI_0F_TERMINAL_EVIDENCE.json').read_text()
          )
          report = json.loads(report_path.read_text())
          classification = json.loads(classification_path.read_text())

          def digest(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          expected = {
              'report_sha256': digest(report_path),
              'classification_sha256': digest(classification_path),
              'failure_log_sha256': digest(log_path),
          }
          for key, value in expected.items():
              if evidence.get(key) != value:
                  raise SystemExit(f'{key} mismatch')
          if classification.get('classification') != 'FAIL':
              raise SystemExit('classification is not FAIL')
          if report.get('crashed') is not True or report.get('complete') is not False:
              raise SystemExit('report is not the frozen crash result')
          if report.get('source_match') is not True:
              raise SystemExit('source verification was not preserved')
          if report.get('authority_closed') is not True:
              raise SystemExit('authority boundary opened')
          if evidence.get('second_execution_performed') is not False:
              raise SystemExit('a second qualifying execution was recorded')
          if evidence.get('execution_commit') != '5c4fded7eda16cbf3a6673880557c2242e430c14':
              raise SystemExit('execution commit changed')
          log = log_path.read_text(errors='replace')
          if 'InvalidDigestText("learning proposal digest")' not in log:
              raise SystemExit('preserved failure reason missing')
          if 'exit code 101' not in log:
              raise SystemExit('preserved process exit missing')
          PY

      - name: Enforce no-rerun workflow boundary
        run: |
          forbidden='cargo run -p star --example '
          forbidden+='ei_0f_terminal_experiment'
          if grep -Fq "$forbidden" .github/workflows/ei-0f-terminal-execution.yml; then
            echo 'read-only result gate must not execute EI-0F' >&2
            exit 1
          fi
