name: Relational Residual R1 CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/relational/**"
      - "lib/examples/r1_relational_residual_bridge.rs"
      - "lib/lib.rs"
      - "lib/Cargo.toml"
      - "docs/experiments/R1_RELATIONAL_RESIDUAL_BRIDGE.md"
      - ".github/workflows/relational-residual-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  r1-shadow-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format temporary checkout
        run: |
          cargo fmt --all
          git diff --binary -- lib/lib.rs lib/relational/mod.rs \
            lib/examples/r1_relational_residual_bridge.rs > r1-rustfmt.patch

      - name: Compile feature-gated bridge
        run: cargo check -p star --lib --features relational-evidence --locked

      - name: Test relational contracts deterministically
        run: >-
          cargo test -p star relational:: --features relational-evidence --locked
          -- --test-threads=1

      - name: Run R1 replay probe
        run: |
          set -o pipefail
          cargo run -p star --example r1_relational_residual_bridge \
            --features relational-evidence --locked \
            | tee r1-relational-residual-report.json

      - name: Preserve R1 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r1-relational-residual-diagnostics
          path: |
            r1-relational-residual-report.json
            r1-rustfmt.patch
          if-no-files-found: ignore
          retention-days: 30
