name: Relational Residual R1 CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/relational/**"
      - "lib/companion_observer.rs"
      - "lib/examples/r1_relational_residual_bridge.rs"
      - "lib/examples/s3_companion_observer_false_positive_probe.rs"
      - "lib/lib.rs"
      - "lib/Cargo.toml"
      - "docs/experiments/R1_RELATIONAL_RESIDUAL_BRIDGE.md"
      - ".github/workflows/relational-residual-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  r1-shadow-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check R1 formatting
        run: >-
          rustfmt --edition 2021 --check
          lib/relational/mod.rs
          lib/examples/r1_relational_residual_bridge.rs

      - name: Compile feature-gated bridge
        run: cargo check -p star --lib --features relational-evidence --locked

      - name: Test relational contracts deterministically
        run: >-
          cargo test -p star --lib --features relational-evidence --locked relational::
          -- --test-threads=1

      - name: Run R1 replay probe
        run: |
          set -o pipefail
          cargo run -p star --example r1_relational_residual_bridge \
            --features relational-evidence --locked \
            | tee r1-relational-residual-report.json

      - name: Preserve R1 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r1-relational-residual-report
          path: r1-relational-residual-report.json
          if-no-files-found: ignore
          retention-days: 30

  s3-observer-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format S3 sources and capture patch
        run: |
          rustfmt --edition 2021 \
            lib/companion_observer.rs \
            lib/examples/s3_companion_observer_false_positive_probe.rs
          git diff -- \
            lib/companion_observer.rs \
            lib/examples/s3_companion_observer_false_positive_probe.rs \
            > s3-rustfmt.patch

      - name: Compile S3 observer and probe
        run: |
          cargo check -p star --lib --features companion-observer --locked
          cargo check -p star --example s3_companion_observer_false_positive_probe \
            --features companion-observer --locked

      - name: Lint S3 observer under module-local warning denial
        run: |
          set -o pipefail
          cargo clippy -p star --lib --features companion-observer --locked \
            2>&1 | tee s3-clippy.log

      - name: Test S3 contracts deterministically
        run: >-
          cargo test -p star --features companion-observer --locked companion_observer::
          -- --test-threads=1

      - name: Run S3 matched-control probe
        run: |
          set -o pipefail
          cargo run -p star --example s3_companion_observer_false_positive_probe \
            --features companion-observer --locked \
            | tee s3-companion-observer-report.json

      - name: Preserve S3 report, lint, and formatting patch
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s3-companion-observer-report
          path: |
            s3-companion-observer-report.json
            s3-clippy.log
            s3-rustfmt.patch
          if-no-files-found: ignore
          retention-days: 30
