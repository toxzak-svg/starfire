name: Omega V1-F2 Live Shadow CI

# Temporary, branch-scoped L1-C materialization gate. Restore the read-only F2
# workflow immediately after the generated branch commit lands.
on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/apply_stlm_l1c_authoring.py"
      - ".github/workflows/omega-v1f2-ci.yml"

permissions:
  contents: write

jobs:
  author-stlm-l1c:
    if: github.event.pull_request.head.ref == 'feat/stlm-l1c-shadow-observation-v3'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out L1-C branch
        uses: actions/checkout@v4
        with:
          ref: feat/stlm-l1c-shadow-observation-v3

      - name: Install Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Materialize bounded L1-C implementation
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/apply_stlm_l1c_authoring.py
          python3 scripts/apply_stlm_l1c_authoring.py
          rustfmt --edition 2021 lib/api.rs
          rustfmt --edition 2021 --config skip_children=true lib/lib.rs
          rustfmt --edition 2021 \
            lib/stlm_l1c_shadow.rs \
            lib/examples/stlm_l1c_shadow_probe.rs
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/api.rs \
            lib/lib.rs \
            lib/Cargo.toml \
            lib/stlm_l1c_shadow.rs \
            lib/examples/stlm_l1c_shadow_probe.rs \
            src/Cargo.toml \
            Dockerfile \
            entrypoint.sh \
            docs/experiments/STLM_L1C_SHADOW_OBSERVATION_PREREGISTRATION.md \
            docs/experiments/STLM_L1C_SHADOW_OBSERVATION_STATUS.md \
            .github/workflows/stlm-l1c-shadow-ci.yml
          git commit -m "feat(language): add L1-C verified improvisation shadow"
          git push origin HEAD:feat/stlm-l1c-shadow-observation-v3
