name: Companion Prediction S4 CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "lib/companion_prediction_ledger.rs"
      - "lib/examples/s4_companion_prediction_ledger_probe.rs"
      - "lib/lib.rs"
      - "lib/Cargo.toml"
      - "docs/INGEXUITY_STARFIRE_INTEGRATION.md"
      - "docs/experiments/S4_COMPANION_PREDICTION_LEDGER.md"
      - ".github/workflows/companion-prediction-ci.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  s4-prediction-ledger:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Apply empty-summary correction
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("lib/companion_prediction_ledger.rs")
          text = path.read_text()
          old = '''            mean_brier_score_ppm: (resolved > 0)
                          .then_some((total_brier_score_ppm / resolved) as u32),'''
          old = old.replace("                          .then", "                .then")
          new = '''            mean_brier_score_ppm: if resolved > 0 {
                Some((total_brier_score_ppm / resolved) as u32)
            } else {
                None
            },'''
          if old not in text:
              raise SystemExit("expected empty-summary expression was not found")
          path.write_text(text.replace(old, new, 1))
          PY
          rustfmt --edition 2021 lib/companion_prediction_ledger.rs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/companion_prediction_ledger.rs
          git commit -m "fix(companion): avoid empty-summary division"
          git push origin HEAD:${{ github.head_ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format S4 sources for verification
        run: |
          rustfmt --edition 2021 \
            lib/companion_prediction_ledger.rs \
            lib/examples/s4_companion_prediction_ledger_probe.rs

      - name: Compile S4 ledger and probe
        run: |
          cargo check -p star --lib --features companion-prediction-ledger --locked
          cargo check -p star --example s4_companion_prediction_ledger_probe \
            --features companion-prediction-ledger --locked

      - name: Lint S4 feature path
        run: cargo clippy -p star --lib --features companion-prediction-ledger --locked

      - name: Test S4 contracts deterministically
        run: >-
          cargo test -p star --lib --features companion-prediction-ledger --locked
          companion_prediction_ledger:: -- --test-threads=1

      - name: Run frozen S4 replay and controls
        run: |
          set -o pipefail
          cargo run -p star --example s4_companion_prediction_ledger_probe \
            --features companion-prediction-ledger --locked \
            | tee s4-companion-prediction-report.json

      - name: Preserve S4 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s4-companion-prediction-report
          path: s4-companion-prediction-report.json
          if-no-files-found: ignore
          retention-days: 30
