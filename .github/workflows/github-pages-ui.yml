name: Deploy Starfire UI to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "ui/**"
      - ".github/workflows/github-pages-ui.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Build static Starfire frontend
        working-directory: ui
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_STAR_API: https://starfire-cuee.onrender.com
        run: npm run build

      - name: Verify static export
        run: |
          set -euo pipefail
          test -s ui/out/index.html
          grep -qi '<html' ui/out/index.html
          touch ui/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ui/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
