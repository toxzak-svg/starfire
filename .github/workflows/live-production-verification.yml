name: Live Production Verification

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/live-production-check"
      - ".github/workflows/live-production-verification.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Verify Render backend health
        run: |
          set -euo pipefail
          backend="https://starfire-cuee.onrender.com"
          for attempt in $(seq 1 24); do
            if curl --fail --silent --show-error --max-time 25 \
              "$backend/health" -o render-health.json; then
              break
            fi
            if [ "$attempt" -eq 24 ]; then
              echo "Render health endpoint did not become ready" >&2
              exit 1
            fi
            sleep 10
          done
          test -s render-health.json
          python3 -m json.tool render-health.json > /dev/null

      - name: Verify Render identity endpoint
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 \
            https://starfire-cuee.onrender.com/identity \
            -o render-identity.json
          test -s render-identity.json
          python3 -m json.tool render-identity.json > /dev/null

      - name: Verify GitHub Pages frontend
        run: |
          set -euo pipefail
          frontend="https://toxzak-svg.github.io/starfire"
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error --location --max-time 25 \
              "$frontend/" -o github-pages-index.html; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "GitHub Pages frontend did not become ready" >&2
              exit 1
            fi
            sleep 10
          done
          test -s github-pages-index.html
          grep -qi '<html' github-pages-index.html
          grep -q 'starfire-cuee.onrender.com' github-pages-index.html || \
            grep -R -q 'starfire-cuee.onrender.com' . || true

      - name: Publish verification summary
        run: |
          {
            echo "## Live production verification"
            echo
            echo "- Render health: reachable and valid JSON"
            echo "- Render identity: reachable and valid JSON"
            echo "- GitHub Pages frontend: reachable and returned HTML"
            echo "- EI live learning: not enabled by this check"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Preserve endpoint evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-production-verification
          path: |
            render-health.json
            render-identity.json
            github-pages-index.html
          if-no-files-found: ignore
          retention-days: 7
