<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zach's SmolLM3 - Browser AI</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px; margin: 0 auto; padding: 20px;
            background: #1a1a2e; color: #eee;
        }
        h1 { color: #00d4ff; }
        #status { 
            padding: 10px; border-radius: 5px; margin: 10px 0;
            background: #16213e;
        }
        .loading { color: #ffa500; }
        .ready { color: #00ff88; }
        .error { color: #ff4444; }
        #chat { 
            background: #16213e; padding: 20px; border-radius: 10px; 
            min-height: 300px; margin: 20px 0;
        }
        .message { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .user { background: #0f3460; }
        .ai { background: #1a1a2e; border-left: 3px solid #00d4ff; }
        textarea { 
            width: 100%; padding: 10px; border-radius: 5px;
            background: #16213e; color: #eee; border: 1px solid #333;
            font-size: 16px;
        }
        button { 
            background: #00d4ff; color: #000; padding: 10px 20px;
            border: none; border-radius: 5px; cursor: pointer;
            font-size: 16px; margin-top: 10px;
        }
        button:disabled { background: #666; cursor: not-allowed; }
        #gpu-info { font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <h1>Zach's SmolLM3</h1>
    <p>Running locally in your browser with WebGPU</p>
    
    <div id="gpu-info">GPU: <span id="gpu-name">Checking...</span></div>
    <div id="status"><span class="loading">Loading model...</span></div>
    
    <div id="chat"></div>
    
    <textarea id="input" rows="3" placeholder="Type your message..."></textarea>
    <button id="send" disabled>Send</button>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        
        // Use WebGPU
        env.allowLocalModels = false;
        env.useBrowserCache = true;
        
        const STATUS = document.getElementById('status');
        const CHAT = document.getElementById('chat');
        const INPUT = document.getElementById('input');
        const SEND = document.getElementById('send');
        const GPU_NAME = document.getElementById('gpu-name');
        
        let generator = null;
        
        // Check WebGPU
        async function checkGPU() {
            if (navigator.gpu) {
                const adapter = await navigator.gpu.requestAdapter();
                if (adapter) {
                    const device = await adapter.requestDevice();
                    GPU_NAME.textContent = adapter.info?.device || 'WebGPU Available';
                    return true;
                }
            }
            GPU_NAME.textContent = 'WebGPU not available, using WASM';
            return false;
        }
        
        async function loadModel() {
            try {
                // Use a small model that works in browser
                // SmolLM 135M is small enough for browser
                generator = await pipeline('text-generation', 'Xenova/SmolLM-135M', {
                    device: 'webgpu',
                    dtype: 'q4', // Quantized
                });
                STATUS.innerHTML = '<span class="ready">Ready! Model loaded.</span>';
                SEND.disabled = false;
            } catch (e) {
                console.error(e);
                // Fallback to CPU
                try {
                    generator = await pipeline('text-generation', 'Xenova/SmolLM-135M', {
                        device: 'cpu',
                    });
                    STATUS.innerHTML = '<span class="ready">Ready! (CPU mode)</span>';
                    SEND.disabled = false;
                } catch (e2) {
                    STATUS.innerHTML = '<span class="error">Failed to load: ' + e2.message + '</span>';
                }
            }
        }
        
        async function sendMessage() {
            const text = INPUT.value.trim();
            if (!text) return;
            
            // Add user message
            addMessage('user', text);
            INPUT.value = '';
            
            // Disable while generating
            SEND.disabled = true;
            
            try {
                // System prompt for Zach's assistant style
                const prompt = `You are Claw, a helpful AI assistant. You are direct, concise, and curious. ${text}`;
                
                const output = await generator(prompt, {
                    max_new_tokens: 150,
                    temperature: 0.7,
                    top_p: 0.9,
                });
                
                const response = output[0].generated_text.replace(prompt, '').trim();
                addMessage('ai', response);
            } catch (e) {
                addMessage('ai', 'Error: ' + e.message);
            }
            
            SEND.disabled = false;
        }
        
        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = (role === 'user' ? 'You: ' : 'Claw: ') + text;
            CHAT.appendChild(div);
            CHAT.scrollTop = CHAT.scrollHeight;
        }
        
        // Initialize
        await checkGPU();
        await loadModel();
        
        SEND.addEventListener('click', sendMessage);
        INPUT.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
