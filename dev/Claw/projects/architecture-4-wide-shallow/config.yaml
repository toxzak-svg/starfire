# Wide and Shallow Transformer Configuration

model:
  # Architecture dimensions
  num_layers: 4
  num_heads: 64  # 4096 / 64 = 64 heads -> head_dim = 64
  hidden_size: 4096
  intermediate_size: 11008
  vocab_size: 50257
  
  # Grouped-query attention settings
  num_kv_heads: 8
  groups_per_kv: 8
  
  # Architecture features
  max_position_embeddings: 4096
  use_bias: false
  activation: "silu"  # SwiGLU activation
  
  # Residual configuration
  residual_dropout: 0.0
  embed_dropout: 0.0
  
  # Memory optimization
  gradient_checkpointing: true  # Save memory at compute cost

training:
  # Training hyperparameters
  learning_rate: 1.0e-4
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.95
  
  # Learning rate schedule
  warmup_steps: 1000
  max_steps: 100000
  min_lr: 1.0e-6
  
  # Batch settings - REDUCED for 30GB VRAM
  batch_size: 1  # Reduced from default
  gradient_accumulation_steps: 16  # Increase to maintain effective batch
  max_seq_length: 2048
  
  # Optimization
  max_grad_norm: 1.0
  mixed_precision: true
  
  # Initialization (critical for wide layers)
  init_method: "small_init"  # or "normal" with careful std
  init_std: 0.02

data:
  # Data paths (to be configured)
  train_path: null
  val_path: null
  test_path: null
  
  # Data processing
  tokenizer: "gpt2"
  preprocessing_num_workers: 4

benchmark:
  # Benchmark tasks
  code_completion: false
  math_reasoning: false
  long_context: false
  
  # Evaluation settings
  eval_steps: 1000
  eval_batch_size: 8
