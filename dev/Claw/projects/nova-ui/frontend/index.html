<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141418;
      --surface2: #1c1c22;
      --border: #2a2a35;
      --accent: #7c6fff;
      --accent-dim: #5a4fd4;
      --text: #e8e8ef;
      --text-dim: #8888a0;
      --text-muted: #55556a;
      --nova: #c4a0ff;
      --human: #6ec8ff;
      --success: #4ade80;
      --warning: #fbbf24;
      --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'Cascadia Code', 'Fira Code', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
    }

    body {
      display: grid;
      grid-template-columns: 280px 1fr 300px;
      grid-template-rows: 100vh;
      overflow: hidden;
    }

    /* ---- LEFT SIDEBAR ---- */
    .sidebar-left {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-header .logo {
      width: 28px;
      height: 28px;
      background: var(--nova);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--bg);
    }

    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--nova);
    }

    .sidebar-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .projects-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }

    .projects-list li {
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 6px;
      margin: 2px 8px;
      transition: background 0.15s;
    }

    .projects-list li:hover {
      background: var(--surface2);
    }

    .projects-list li.active {
      background: var(--accent-dim);
      color: white;
    }

    .projects-list .proj-name {
      font-size: 13px;
      font-weight: 500;
    }

    .projects-list .proj-desc {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ---- MAIN CHAT ---- */
    .chat-main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .chat-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .chat-header-title {
      font-size: 14px;
      font-weight: 600;
    }

    .chat-header-status {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
    }

    .status-dot.offline { background: var(--text-muted); }
    .status-dot.warning { background: var(--warning); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .message.human {
      align-self: flex-end;
    }

    .message.nova {
      align-self: flex-start;
    }

    .message-label {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .message.human .message-label { color: var(--human); }
    .message.nova .message-label { color: var(--nova); }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.human .message-bubble {
      background: var(--surface2);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .message.nova .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .message.nova .message-bubble.thinking {
      color: var(--text-dim);
      font-style: italic;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .chat-input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 200px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    .chat-input:focus {
      border-color: var(--accent-dim);
    }

    .chat-input::placeholder {
      color: var(--text-muted);
    }

    .chat-send {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .chat-send:hover { background: var(--accent-dim); }
    .chat-send:active { transform: scale(0.95); }
    .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- RIGHT SIDEBAR ---- */
    .sidebar-right {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .personality-panel {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .trait-item {
      margin-bottom: 10px;
    }

    .trait-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .trait-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .trait-strength {
      font-size: 10px;
      color: var(--text-muted);
    }

    .trait-bar-bg {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .trait-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .trait-desc {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .anchor-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .anchor-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }

    .context-panel {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .context-section {
      margin-bottom: 16px;
    }

    .context-section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .context-text {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .gateway-status {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
    }

    .gateway-status .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 6px;
    }

    /* ---- WELCOME ---- */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px;
    }

    .welcome-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--nova), var(--accent));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 24px;
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome p {
      color: var(--text-dim);
      max-width: 320px;
      font-size: 14px;
    }

    /* ---- SCROLLBAR ---- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 1100px) {
      body { grid-template-columns: 1fr; }
      .sidebar-left, .sidebar-right { display: none; }
    }
  </style>
</head>
<body>

  <!-- LEFT SIDEBAR: Projects -->
  <aside class="sidebar-left">
    <div class="sidebar-header">
      <div class="logo">N</div>
      <h1>Nova</h1>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Projects</div>
    </div>
    <ul class="projects-list" id="projects-list">
      <li>Loading...</li>
    </ul>
  </aside>

  <!-- MAIN CHAT -->
  <main class="chat-main">
    <header class="chat-header">
      <span class="chat-header-title">Nova</span>
      <div class="chat-header-status">
        <span class="status-dot" id="gateway-dot"></span>
        <span id="gateway-label">Connecting...</span>
      </div>
    </header>

    <div class="chat-messages" id="chat-messages">
      <div class="welcome">
        <div class="welcome-logo">✨</div>
        <h2>Hey.</h2>
        <p>I'm here. What are we working on?</p>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <textarea
          class="chat-input"
          id="chat-input"
          placeholder="Say something..."
          rows="1"
          onkeydown="handleKeyDown(event)"
          oninput="autoGrow(this)"
        ></textarea>
        <button class="chat-send" id="chat-send" onclick="sendMessage()">→</button>
      </div>
    </div>
  </main>

  <!-- RIGHT SIDEBAR: Personality + Context -->
  <aside class="sidebar-right">
    <div class="sidebar-section" style="border-bottom: 1px solid var(--border);">
      <div class="sidebar-section-title">Voice — Active Traits</div>
      <div id="traits-list">
        <div style="font-size: 12px; color: var(--text-dim);">Waiting for context...</div>
      </div>
    </div>

    <div class="sidebar-section" style="border-bottom: 1px solid var(--border); padding: 12px 16px;">
      <div class="sidebar-section-title">Relationship</div>
      <div id="anchors-list"></div>
    </div>

    <div class="context-panel">
      <div class="context-section">
        <div class="context-section-title">Session Context</div>
        <div class="context-text" id="context-text">
          Loading...
        </div>
      </div>
      <div class="context-section">
        <div class="context-section-title">Memory</div>
        <div class="context-text" id="memory-text" style="font-size: 11px;">
          ...
        </div>
      </div>
    </div>

    <div class="gateway-status">
      <span class="dot" id="gateway-dot2"></span>
      <span id="gateway-status-text">UI v1.0.0</span>
    </div>
  </aside>

<script>
  // ----------------------------------------------------------------
  // STATE
  // ----------------------------------------------------------------
  let gatewayOnline = false;
  let sending = false;

  // ----------------------------------------------------------------
  // INIT
  // ----------------------------------------------------------------
  window.addEventListener("DOMContentLoaded", () => {
    loadStatus();
    loadProjects();
    refreshPersonality();
    setInterval(refreshPersonality, 30000);
  });

  // ----------------------------------------------------------------
  // API HELPERS
  // ----------------------------------------------------------------
  async function api(path, options = {}) {
    const r = await fetch(`/api${path}`, {
      headers: { "Content-Type": "application/json" },
      ...options,
    });
    if (!r.ok) throw new Error(`API ${r.status}: ${await r.text()}`);
    return r.json();
  }

  // ----------------------------------------------------------------
  // STATUS PANEL
  // ----------------------------------------------------------------
  async function loadStatus() {
    try {
      const data = await api("/status");
      gatewayOnline = true;
      document.getElementById("gateway-dot").className = "status-dot";
      document.getElementById("gateway-dot2").className = "dot";
      document.getElementById("gateway-label").textContent = "Online";

      const ctx = data.context || {};
      if (ctx.context) {
        document.getElementById("context-text").textContent =
          ctx.context.slice(0, 600) + (ctx.context.length > 600 ? "..." : "");
      }
      if (ctx.memory) {
        document.getElementById("memory-text").textContent =
          ctx.memory.slice(-1000);
      }
    } catch(e) {
      gatewayOnline = false;
      document.getElementById("gateway-dot").className = "status-dot offline";
      document.getElementById("gateway-dot2").className = "dot";
      document.getElementById("gateway-label").textContent = "Offline";
    }
  }

  // ----------------------------------------------------------------
  // PROJECTS
  // ----------------------------------------------------------------
  async function loadProjects() {
    try {
      const projects = await api("/projects");
      const list = document.getElementById("projects-list");
      if (!projects.length) {
        list.innerHTML = "<li style='color: var(--text-dim); font-size: 12px;'>No projects found</li>";
        return;
      }
      list.innerHTML = projects.map(p => `
        <li>
          <div class="proj-name">${p.name}</div>
          <div class="proj-desc">${p.description || ""}</div>
        </li>
      `).join("");
    } catch(e) {
      document.getElementById("projects-list").innerHTML = "<li style='color: var(--text-dim)'>Error loading</li>";
    }
  }

  // ----------------------------------------------------------------
  // PERSONALITY PANEL
  // ----------------------------------------------------------------
  async function refreshPersonality() {
    try {
      const data = await api("/personality");
      const traits = data.traits || [];
      const traitsEl = document.getElementById("traits-list");
      if (traits.length === 0) {
        traitsEl.innerHTML = '<div style="font-size:12px;color:var(--text-dim)">No active traits yet. Start chatting!</div>';
      } else {
        traitsEl.innerHTML = traits.map(([name, strength, desc]) => `
          <div class="trait-item">
            <div class="trait-header">
              <span class="trait-name">${name}</span>
              <span class="trait-strength">${Math.round(strength * 100)}%</span>
            </div>
            <div class="trait-bar-bg">
              <div class="trait-bar" style="width: ${strength * 100}%"></div>
            </div>
            <div class="trait-desc">${desc || ""}</div>
          </div>
        `).join("");
      }

      const anchors = data.anchors || {};
      const anchorsEl = document.getElementById("anchors-list");
      const activeAnchors = Object.entries(anchors).filter(([k,v]) => v > 0.7);
      anchorsEl.innerHTML = activeAnchors.map(([name, val]) => `
        <div class="anchor-item">
          <span class="anchor-dot"></span>
          <span>${name.replace(/_/g, " ")}</span>
        </div>
      `).join("") || '<div style="font-size:11px;color:var(--text-dim)">No active anchors</div>';
    } catch(e) { /* silent */ }
  }

  // ----------------------------------------------------------------
  // CHAT
  // ----------------------------------------------------------------
  function addMessage(role, text, isThinking = false) {
    const messages = document.getElementById("chat-messages");
    const welcome = messages.querySelector(".welcome");
    if (welcome) welcome.remove();

    const div = document.createElement("div");
    div.className = `message ${role}`;
    const label = role === "human" ? "You" : "Nova";
    const bubbleClass = isThinking ? "message-bubble thinking" : "message-bubble";
    div.innerHTML = `
      <div class="message-label">${label}</div>
      <div class="${bubbleClass}">${escapeHtml(text)}</div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function addTypingIndicator() {
    const messages = document.getElementById("chat-messages");
    const div = document.createElement("div");
    div.className = "message nova";
    div.id = "typing";
    div.innerHTML = `
      <div class="message-label">Nova</div>
      <div class="message-bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTypingIndicator() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    if (sending) return;
    const input = document.getElementById("chat-input");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";
    sending = true;
    document.getElementById("chat-send").disabled = true;

    addMessage("human", text);
    addTypingIndicator();

    try {
      const r = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, stream: true }),
      });

      removeTypingIndicator();

      if (!r.ok) {
        addMessage("nova", `Error: ${r.status} — ${await r.text()}`);
        return;
      }

      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let novaDiv = addMessage("nova", "");
      let buf = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });

        // SSE events end with double-newline
        const parts = buf.split("

");
        buf = parts.pop() || "";

        for (const part of parts) {
          if (!part.startsWith("data:")) continue;
          const dataStr = part.slice(5).trim();
          if (!dataStr) continue;

          try {
            const evt = JSON.parse(dataStr);
            if (evt.type === "text") {
              novaDiv.querySelector(".message-bubble").textContent += evt.content || "";
              document.getElementById("chat-messages").scrollTop = 999999;
            } else if (evt.type === "done") {
              break;
            } else if (evt.type === "error") {
              novaDiv.querySelector(".message-bubble").textContent += "
[Error: " + evt.content + "]";
            }
          } catch(e) {
            console.warn("SSE parse error:", e, dataStr);
          }
        }
      }

      // Flush any remaining buffer
      if (buf.trim()) {
        const line = buf.trim();
        if (line.startsWith("data:")) {
          try {
            const evt = JSON.parse(line.slice(5).trim());
            if (evt.type === "text" && evt.content) {
              novaDiv.querySelector(".message-bubble").textContent += evt.content;
            }
          } catch(e) { console.warn("Final SSE parse error:", e); }
        }
      }

    } catch(e) {
      removeTypingIndicator();
      addMessage("nova", "Connection error: " + e.message);
    } finally {
      sending = false;
      document.getElementById("chat-send").disabled = false;
      document.getElementById("chat-input").focus();
      refreshPersonality();
    }
  }

  function handleKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoGrow(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 200) + "px";
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }
</script>
</body>
</html>
