<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141418;
      --surface2: #1c1c22;
      --border: #2a2a35;
      --accent: #7c6fff;
      --accent-dim: #5a4fd4;
      --text: #e8e8ef;
      --text-dim: #8888a0;
      --text-muted: #55556a;
      --nova: #c4a0ff;
      --human: #6ec8ff;
      --success: #4ade80;
      --warning: #fbbf24;
      --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'Cascadia Code', 'Fira Code', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
    }

    body {
      display: grid;
      grid-template-columns: 280px 1fr 300px;
      grid-template-rows: 100vh;
      overflow: hidden;
    }

    /* ---- LEFT SIDEBAR ---- */
    .sidebar-left {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-header .logo {
      width: 28px;
      height: 28px;
      background: var(--nova);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--bg);
    }

    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--nova);
    }

    .sidebar-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .projects-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }

    .projects-list li {
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 6px;
      margin: 2px 8px;
      transition: background 0.15s;
    }

    .projects-list li:hover .proj-name {
      color: var(--nova);
    }

    .projects-list li:hover {
      background: var(--surface2);
    }

    .projects-list li.active {
      background: var(--accent-dim);
      color: white;
    }

    .projects-list .proj-name {
      font-size: 13px;
      font-weight: 500;
    }

    .projects-list .proj-desc {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ---- MAIN CHAT ---- */
    .chat-main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .chat-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .chat-header-title {
      font-size: 14px;
      font-weight: 600;
    }

    .chat-header-status {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
    }

    .status-dot.offline { background: var(--text-muted); }
    .status-dot.warning { background: var(--warning); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .message.human {
      align-self: flex-end;
    }

    .message.nova {
      align-self: flex-start;
    }

    .message-label {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .message.human .message-label { color: var(--human); }
    .message.nova .message-label { color: var(--nova); }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.human .message-bubble {
      background: var(--surface2);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .message.nova .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .message.nova .message-bubble.thinking {
      color: var(--text-dim);
      font-style: italic;
      border-color: var(--accent-dim);
      animation: thinking-pulse 1.8s ease-in-out infinite;
    }

    .thinking-label {
      font-size: 11px;
      color: var(--text-muted);
      font-style: normal;
      animation: thinking-dots 1.4s ease-in-out infinite;
    }

    @keyframes thinking-dots {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes thinking-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(124, 111, 255, 0); }
      50% { box-shadow: 0 0 8px 2px rgba(124, 111, 255, 0.25); }
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .chat-input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 200px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    .chat-input:focus {
      border-color: var(--accent-dim);
    }

    .chat-input::placeholder {
      color: var(--text-muted);
    }

    .chat-send {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .chat-send:hover { background: var(--accent-dim); }
    .chat-send:active { transform: scale(0.95); }
    .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .char-count {
      font-size: 10px;
      color: var(--text-muted);
      text-align: right;
      margin-top: 4px;
      padding-right: 4px;
      min-height: 14px;
    }

    .char-count.warn { color: var(--warning); }
    .char-count.ok { color: var(--text-muted); }

    /* ---- RIGHT SIDEBAR ---- */
    .sidebar-right {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .personality-panel {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .trait-item {
      margin-bottom: 10px;
    }

    .trait-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .trait-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .trait-strength {
      font-size: 10px;
      color: var(--text-muted);
    }

    .trait-bar-bg {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .trait-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .trait-desc {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .anchor-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .anchor-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }

    .context-panel {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .context-section {
      margin-bottom: 16px;
    }

    .context-section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .context-text {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .gateway-status {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
    }

    .gateway-status .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 6px;
    }

    .gateway-status .dot.offline {
      background: var(--text-muted);
    }

    /* ---- WELCOME ---- */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px;
    }

    .welcome-logo {
      width: 72px;
      height: 72px;
      background: radial-gradient(circle at 35% 35%, #d4a8ff 0%, #7c6fff 45%, #4a3db8 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 28px;
      box-shadow: 0 0 40px rgba(124, 111, 255, 0.4), 0 0 80px rgba(124, 111, 255, 0.15);
      animation: pulse-glow 3s ease-in-out infinite, float 4s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 40px rgba(124, 111, 255, 0.4), 0 0 80px rgba(124, 111, 255, 0.15); }
      50% { box-shadow: 0 0 50px rgba(124, 111, 255, 0.55), 0 0 100px rgba(124, 111, 255, 0.25); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome-nova-ring {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      position: relative;
    }

    .welcome-nova-ring::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      opacity: 0.9;
    }

    .welcome h2 {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome p {
      color: var(--text-dim);
      max-width: 320px;
      font-size: 14px;
    }

    .welcome-hint {
      margin-top: 20px;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
    }

    .welcome-hint kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 10px;
    }

    /* ---- SCROLLBAR ---- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 1100px) {
      body { grid-template-columns: 1fr; }
      .sidebar-left, .sidebar-right { display: none; }
    }
  </style>
</head>
<body>

  <!-- LEFT SIDEBAR: Projects -->
  <aside class="sidebar-left">
    <div class="sidebar-header">
      <div class="logo">N</div>
      <h1>Nova</h1>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Projects</div>
    </div>
    <ul class="projects-list" id="projects-list">
      <li>Loading...</li>
    </ul>
  </aside>

  <!-- MAIN CHAT -->
  <main class="chat-main">
    <header class="chat-header">
      <span class="chat-header-title">Nova</span>
      <div style="display:flex;align-items:center;gap:12px;">
        <button onclick="clearChat()" title="Clear chat" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:4px 8px;border-radius:6px;transition:background 0.15s,color 0.15s;" onmouseover="this.style.background='var(--surface2)';this.style.color='var(--text)'" onmouseout="this.style.background='none';this.style.color='var(--text-muted)'">Clear</button>
        <div class="chat-header-status">
          <span class="status-dot" id="gateway-dot"></span>
          <span id="gateway-label">Connecting...</span>
        </div>
      </div>
    </header>

    <div class="chat-messages" id="chat-messages">
      <div class="welcome">
        <div class="welcome-logo"><div class="welcome-nova-ring"></div></div>
        <h2>Hey.</h2>
        <p>I'm here. What are we working on?</p>
        <div class="welcome-hint">
          <span><kbd>Enter</kbd> send</span>
          <span><kbd>Shift+Enter</kbd> newline</span>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <textarea
          class="chat-input"
          id="chat-input"
          placeholder="Say something..."
          rows="1"
          onkeydown="handleKeyDown(event)"
          oninput="autoGrow(this); updateCharCount()"
        ></textarea>
        <button class="chat-send" id="chat-send" onclick="sendMessage()">→</button>
      </div>
      <div class="char-count" id="char-count"></div>
    </div>
  </main>

  <!-- RIGHT SIDEBAR: Personality + Context -->
  <aside class="sidebar-right">
    <div class="sidebar-section" style="border-bottom: 1px solid var(--border);">
      <div class="sidebar-section-title">Voice — Active Traits</div>
      <div id="traits-list">
        <div style="font-size: 12px; color: var(--text-dim);">Waiting for context...</div>
      </div>
    </div>

    <div class="sidebar-section" style="border-bottom: 1px solid var(--border); padding: 12px 16px;">
      <div class="sidebar-section-title">Relationship</div>
      <div id="anchors-list"></div>
    </div>

    <div class="context-panel">
      <div class="context-section">
        <div class="context-section-title">Session Context</div>
        <div class="context-text" id="context-text">
          Loading...
        </div>
      </div>
      <div class="context-section">
        <div class="context-section-title">Memory</div>
        <div class="context-text" id="memory-text" style="font-size: 11px;">
          ...
        </div>
      </div>
    </div>

    <div class="gateway-status">
      <span class="dot" id="gateway-dot2"></span>
      <span id="gateway-status-text">UI v1.0.0</span>
    </div>
  </aside>

<script>
  // ----------------------------------------------------------------
  // STATE
  // ----------------------------------------------------------------
  let gatewayOnline = false;
  let sending = false;
  let activeProject = null;

  // ----------------------------------------------------------------
  // INIT
  // ----------------------------------------------------------------
  window.addEventListener("DOMContentLoaded", () => {
    loadStatus();
    refreshPersonality();
    setInterval(refreshPersonality, 30000);
    setInterval(loadStatus, 60000); // refresh gateway status periodically
  });

  // ----------------------------------------------------------------
  // API HELPERS
  // ----------------------------------------------------------------
  async function api(path, options = {}) {
    const r = await fetch(`/api${path}`, {
      headers: { "Content-Type": "application/json" },
      ...options,
    });
    if (!r.ok) throw new Error(`API ${r.status}: ${await r.text()}`);
    return r.json();
  }

  // ----------------------------------------------------------------
  // STATUS PANEL
  // ----------------------------------------------------------------
  async function loadStatus() {
    try {
      const data = await api("/status");
      gatewayOnline = true;
      document.getElementById("gateway-dot").className = "status-dot";
      document.getElementById("gateway-dot2").className = "dot";
      document.getElementById("gateway-label").textContent = "Online";

      const ctx = data.context || {};
      if (ctx.context) {
        document.getElementById("context-text").textContent =
          ctx.context.slice(0, 600) + (ctx.context.length > 600 ? "..." : "");
      } else {
        document.getElementById("context-text").textContent = "No active context";
        document.getElementById("context-text").style.color = "var(--text-muted)";
        document.getElementById("context-text").style.fontStyle = "italic";
      }
      if (ctx.memory) {
        const mem = ctx.memory.slice(-1000);
        document.getElementById("memory-text").textContent =
          (mem.length === 1000 ? "...\n" : "") + mem;
      } else {
        document.getElementById("memory-text").textContent = "No memory yet";
        document.getElementById("memory-text").style.color = "var(--text-muted)";
        document.getElementById("memory-text").style.fontStyle = "italic";
      }

      // Projects come from /api/status — render them directly
      if (data.projects) {
        window._projectsCache = data.projects;
        renderProjects(data.projects);
      }
    } catch(e) {
      gatewayOnline = false;
      document.getElementById("gateway-dot").className = "status-dot offline";
      document.getElementById("gateway-dot2").className = "dot offline";
      document.getElementById("gateway-label").textContent = "Offline";
    }
  }

  // ----------------------------------------------------------------
  // PROJECTS (loaded from /api/status to avoid double-fetch)
  // ----------------------------------------------------------------
  function renderProjects(projects) {
    const list = document.getElementById("projects-list");
    if (!projects || !projects.length) {
      list.innerHTML = "<li style='color: var(--text-dim); font-size: 12px;'>No projects found</li>";
      return;
    }
    list.innerHTML = projects.map(p => {
      const isActive = p.name === activeProject;
      return `
      <li class="${isActive ? 'active' : ''}" onclick="insertProject('${escapeHtml(p.name)}')" title="Click to mention this project">
        <div class="proj-name">${escapeHtml(p.name)}</div>
        <div class="proj-desc">${escapeHtml((p.description || "").replace(/^#\s*/, "").slice(0, 80))}</div>
      </li>
    `}).join("");
  }

  // ----------------------------------------------------------------
  // PERSONALITY PANEL
  // ----------------------------------------------------------------
  async function refreshPersonality() {
    try {
      const data = await api("/personality");
      const traits = data.traits || [];
      const traitsEl = document.getElementById("traits-list");
      if (traits.length === 0) {
        traitsEl.innerHTML = '<div style="font-size:12px;color:var(--text-dim)">No active traits yet. Start chatting!</div>';
      } else {
        traitsEl.innerHTML = traits.map(([name, strength, desc]) => `
          <div class="trait-item">
            <div class="trait-header">
              <span class="trait-name">${name}</span>
              <span class="trait-strength">${Math.round(strength * 100)}%</span>
            </div>
            <div class="trait-bar-bg">
              <div class="trait-bar" style="width: ${strength * 100}%"></div>
            </div>
            <div class="trait-desc">${desc || ""}</div>
          </div>
        `).join("");
      }

      const anchors = data.anchors || {};
      const anchorsEl = document.getElementById("anchors-list");
      const activeAnchors = Object.entries(anchors).filter(([k,v]) => v > 0.7);
      anchorsEl.innerHTML = activeAnchors.map(([name, val]) => `
        <div class="anchor-item">
          <span class="anchor-dot"></span>
          <span>${name.replace(/_/g, " ")}</span>
        </div>
      `).join("") || '<div style="font-size:11px;color:var(--text-dim)">No active anchors</div>';
    } catch(e) { /* silent */ }
  }

  // ----------------------------------------------------------------
  // CHAT
  // ----------------------------------------------------------------
  function addMessage(role, text, isThinking = false) {
    const messages = document.getElementById("chat-messages");
    const welcome = messages.querySelector(".welcome");
    if (welcome) welcome.remove();

    const div = document.createElement("div");
    div.className = `message ${role}`;
    const label = role === "human" ? "You" : "Nova";
    const bubbleClass = isThinking ? "message-bubble thinking" : "message-bubble";
    const bubbleText = isThinking && !text ? '<span class="thinking-label">Thinking<span id="thinking-dots">...</span></span>' : escapeHtml(text);
    div.innerHTML = `
      <div class="message-label">${label}</div>
      <div class="${bubbleClass}">${bubbleText}</div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function addTypingIndicator() {
    const messages = document.getElementById("chat-messages");
    const div = document.createElement("div");
    div.className = "message nova";
    div.id = "typing";
    div.innerHTML = `
      <div class="message-label">Nova</div>
      <div class="message-bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;

    // Also update header to show thinking state
    const statusEl = document.getElementById("gateway-label");
    const prev = statusEl.dataset.originalLabel || statusEl.textContent;
    statusEl.dataset.originalLabel = prev;
    statusEl.textContent = "Nova is thinking...";
    statusEl.style.color = "var(--accent)";
  }

  function removeTypingIndicator() {
    const t = document.getElementById("typing");
    if (t) t.remove();
    // Restore header label
    const statusEl = document.getElementById("gateway-label");
    const prev = statusEl.dataset.originalLabel;
    if (prev) {
      statusEl.textContent = prev;
      statusEl.style.color = "";
      delete statusEl.dataset.originalLabel;
    }
  }

  async function sendMessage() {
    if (sending) return;
    const input = document.getElementById("chat-input");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";
    updateCharCount();
    sending = true;
    document.getElementById("chat-send").disabled = true;

    addMessage("human", text);
    addTypingIndicator();

    try {
      const r = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, stream: true }),
      });

      if (!r.ok) {
        removeTypingIndicator();
        addMessage("nova", `Error: ${r.status} — ${await r.text()}`);
        return;
      }

      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let novaDiv = addMessage("nova", "", true); // show thinking state
      let buf = "";
      let firstText = true;
      let thinkingDotsInterval = null;
      let streamTimeout = null;

      // Animate thinking dots: cycle "..." → "··" → "·" → "..."
      const dotsEl = novaDiv.querySelector("#thinking-dots");
      if (dotsEl) {
        let phase = 0;
        const phases = ["...", "··", "·"];
        thinkingDotsInterval = setInterval(() => {
          phase = (phase + 1) % phases.length;
          dotsEl.textContent = phases[phase];
        }, 500);
      }

      // Fallback: if stream hangs for >120s, clear thinking state
      streamTimeout = setTimeout(() => {
        if (thinkingDotsInterval) clearInterval(thinkingDotsInterval);
        removeTypingIndicator();
        novaDiv.querySelector(".message-bubble").classList.remove("thinking");
        novaDiv.querySelector(".message-bubble").textContent += "\n[Response timed out — please try again]";
      }, 120000);

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });

        // Accumulate lines — chunks can arrive mid-line, so buffer until \n
        while (buf.includes("\n")) {
          const nl = buf.indexOf("\n");
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);

          if (!line || !line.startsWith("data:")) continue;

          const dataStr = line.slice(5).trim();
          if (!dataStr) continue;

          try {
            const evt = JSON.parse(dataStr);
            if (evt.type === "text") {
              // Remove typing indicator + thinking class on first real text
              if (firstText) {
                removeTypingIndicator();
                novaDiv.querySelector(".message-bubble").classList.remove("thinking");
                firstText = false;
              }
              novaDiv.querySelector(".message-bubble").textContent += evt.content || "";
              document.getElementById("chat-messages").scrollTop = 999999;
            } else if (evt.type === "done") {
              if (thinkingDotsInterval) clearInterval(thinkingDotsInterval);
              if (streamTimeout) clearTimeout(streamTimeout);
              break;
            } else if (evt.type === "error") {
              if (firstText) {
                removeTypingIndicator();
                firstText = false;
              }
              novaDiv.querySelector(".message-bubble").textContent += "\n[Error: " + evt.content + "]";
            }
          } catch(e) {
            console.warn("SSE parse error:", e, dataStr);
          }
        }
      }

      // Flush any remaining buffer
      if (buf.trim() && buf.trim().startsWith("data:")) {
        try {
          const evt = JSON.parse(buf.trim().slice(5).trim());
          if (evt.type === "text" && evt.content) {
            if (firstText) {
              removeTypingIndicator();
              firstText = false;
            }
            novaDiv.querySelector(".message-bubble").textContent += evt.content;
          }
        } catch(e) { /* ignore */ }
      }

      if (thinkingDotsInterval) clearInterval(thinkingDotsInterval);
      if (streamTimeout) clearTimeout(streamTimeout);

    } catch(e) {
      if (thinkingDotsInterval) clearInterval(thinkingDotsInterval);
      if (streamTimeout) clearTimeout(streamTimeout);
      removeTypingIndicator();
      addMessage("nova", "Connection error: " + e.message);
    } finally {
      sending = false;
      document.getElementById("chat-send").disabled = false;
      document.getElementById("chat-input").focus();
      refreshPersonality();
    }
  }

  function updateCharCount() {
    const input = document.getElementById("chat-input");
    const el = document.getElementById("char-count");
    if (!input || !el) return;
    const len = input.value.length;
    if (len === 0) {
      el.textContent = "";
      el.className = "char-count";
    } else if (len > 4000) {
      el.textContent = len + " / 4000";
      el.className = "char-count warn";
    } else if (len > 800) {
      el.textContent = len;
      el.className = len > 3500 ? "char-count warn" : "char-count ok";
    } else {
      el.textContent = "";
      el.className = "char-count";
    }
  }

  function handleKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoGrow(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 200) + "px";
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function insertProject(name) {
    const input = document.getElementById("chat-input");
    const prefix = input.value.trim() ? name + ": " : "Project: " + name + "\n";
    input.value = prefix;
    input.focus();
    autoGrow(input);
    activeProject = name;
    renderProjects(window._projectsCache || []);
  }

  function clearChat() {
    const messages = document.getElementById("chat-messages");
    messages.innerHTML = `
      <div class="welcome">
        <div class="welcome-logo"><div class="welcome-nova-ring"></div></div>
        <h2>Hey.</h2>
        <p>I'm here. What are we working on?</p>
        <div class="welcome-hint">
          <span><kbd>Enter</kbd> send</span>
          <span><kbd>Shift+Enter</kbd> newline</span>
        </div>
      </div>
    `;
  }
</script>
</body>
</html>
